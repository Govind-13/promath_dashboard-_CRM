<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Promath CRM — Sales Pipeline Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF8F3;
    --surface: #FFFFFF;
    --surface-alt: #F4F1EA;
    --ink: #1C1917;
    --ink-soft: #44403C;
    --muted: #78716C;
    --muted-soft: #A8A29E;
    --border: #E7E5E0;
    --border-soft: #F0EDE6;
    --accent: #B8410A;
    --accent-soft: #FDF4ED;
    --success: #2D7A4F;
    --success-soft: #E8F3EC;
    --warning: #B8830A;
    --warning-soft: #FDF6E4;
    --info: #3B5AA3;
    --info-soft: #EBF0FA;
    --danger: #B14444;
    --danger-soft: #FBEDED;
    --purple: #6B46C1;
    --purple-soft: #F2EDFB;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; }
  .serif { font-family: 'Fraunces', Georgia, serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  button { font-family: 'Geist', sans-serif; cursor: pointer; }
  input, textarea, select { font-family: 'Geist', sans-serif; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted-soft); }
  
  /* Layout */
  .app { min-height: 100vh; display: flex; }
  .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); padding: 24px 14px; position: fixed; height: 100vh; display: flex; flex-direction: column; }
  .main { flex: 1; margin-left: 240px; padding: 28px 32px; }
  
  /* Header */
  .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
  .header h1 { font-family: 'Fraunces', serif; font-size: 38px; font-weight: 500; margin: 0; letter-spacing: -1px; color: var(--ink); }
  .header .subtitle { font-size: 14px; color: var(--muted); margin-top: 4px; }
  
  /* Buttons */
  .btn-primary { background: var(--accent); color: white; border: none; padding: 10px 18px; border-radius: 8px; font-weight: 500; font-size: 14px; transition: background .15s; }
  .btn-primary:hover { background: #9a3608; }
  .btn-secondary { background: var(--surface); color: var(--ink); border: 1px solid var(--border); padding: 10px 18px; border-radius: 8px; font-weight: 500; font-size: 14px; transition: background .15s; }
  .btn-secondary:hover { background: var(--surface-alt); }
  
  /* Inputs */
  .input, select.input { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 14px; width: 100%; color: var(--ink); outline: none; transition: border .15s; }
  .input:focus { border-color: var(--accent); }
  .label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
  
  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; }
  .stat-card .label { margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .stat-card .value { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 500; letter-spacing: -0.5px; color: var(--ink); }
  
  /* Nav */
  .nav-item { display: flex; align-items: center; gap: 11px; padding: 10px 12px; border-radius: 9px; color: var(--muted); font-size: 14px; cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; margin-bottom: 2px; }
  .nav-item.active { background: var(--surface-alt); color: var(--ink); font-weight: 500; }
  .nav-item:hover:not(.active) { background: var(--surface-alt); }
  .nav-badge { background: var(--accent); color: white; font-size: 11px; padding: 2px 7px; border-radius: 999px; font-weight: 600; margin-left: auto; }
  
  /* Login */
  .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px 20px; }
  .login-inner { max-width: 920px; width: 100%; }
  .login-badge { display: inline-flex; align-items: center; gap: 10px; padding: 5px 14px; background: var(--accent-soft); border-radius: 999px; margin-bottom: 20px; }
  .login-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .login-badge span { font-size: 12px; color: var(--accent); font-weight: 500; letter-spacing: 0.4px; }
  .login-title { font-family: 'Fraunces', serif; font-size: 52px; font-weight: 500; margin: 0 0 10px; letter-spacing: -1.5px; line-height: 1.1; color: var(--ink); }
  .login-title .accent { color: var(--accent); }
  .login-sub { font-size: 15px; color: var(--muted); }
  .login-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 14px; margin-top: 36px; }
  .role-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 26px 22px; text-align: left; cursor: pointer; transition: all .2s; }
  .role-card:hover { transform: translateY(-2px); box-shadow: 0 4px 18px rgba(28,25,23,0.08); }
  .role-icon { width: 44px; height: 44px; border-radius: 11px; display: flex; align-items: center; justify-content: center; margin-bottom: 18px; font-size: 22px; }
  .role-name { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 500; margin-bottom: 6px; color: var(--ink); }
  .role-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .role-enter { margin-top: 16px; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 5px; }
  
  /* Task card */
  .task-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; cursor: pointer; display: flex; align-items: center; gap: 14px; transition: all .15s; text-align: left; width: 100%; font-family: 'Geist', sans-serif; }
  .task-card:hover { transform: translateY(-1px); box-shadow: 0 2px 10px rgba(28,25,23,0.06); }
  .task-icon { width: 38px; height: 38px; border-radius: 10px; background: var(--surface-alt); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; }
  .task-name { font-size: 14px; font-weight: 500; color: var(--ink); margin-bottom: 3px; }
  .task-meta { font-size: 11px; color: var(--muted); }
  .task-action { background: var(--accent-soft); color: var(--accent); padding: 5px 11px; border-radius: 7px; font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
  
  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 8px; font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
  td { padding: 13px 8px; border-bottom: 1px solid var(--border-soft); }
  tr.row { cursor: pointer; transition: background .15s; }
  tr.row:hover { background: var(--surface-alt); }
  .pill { display: inline-flex; align-items: center; gap: 5px; background: var(--surface-alt); padding: 3px 9px; border-radius: 6px; font-size: 11px; color: var(--ink-soft); font-weight: 500; }
  .progress-bar { width: 70px; height: 5px; background: var(--surface-alt); border-radius: 999px; overflow: hidden; display: inline-block; vertical-align: middle; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width .3s; }
  
  /* Kanban */
  .kanban-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
  .kanban-col { background: var(--surface-alt); border-radius: 12px; padding: 12px; min-height: 200px; }
  .kanban-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .kanban-header-title { font-size: 11px; font-weight: 600; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.4px; }
  .kanban-count { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); background: var(--surface); padding: 2px 7px; border-radius: 999px; }
  .kanban-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px; margin-bottom: 6px; cursor: pointer; transition: transform .15s; text-align: left; width: 100%; font-family: 'Geist', sans-serif; }
  .kanban-card:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(28,25,23,0.06); }
  .kanban-card-name { font-size: 12px; font-weight: 500; color: var(--ink); margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .kanban-card-loc { font-size: 10px; color: var(--muted); }
  
  /* Notifications */
  .notif { padding: 11px; background: var(--surface-alt); border-radius: 9px; font-size: 13px; cursor: pointer; margin-bottom: 7px; transition: background .15s; }
  .notif.unread { background: var(--accent-soft); border: 1px solid rgba(184, 65, 10, 0.12); }
  .notif-row { display: flex; align-items: flex-start; gap: 7px; }
  .notif-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-top: 6px; flex-shrink: 0; }
  .notif-time { font-size: 11px; color: var(--muted); margin-top: 4px; }
  
  /* Stage editor */
  .stage-row { border-bottom: 1px solid var(--border-soft); }
  .stage-row:last-child { border-bottom: none; }
  .stage-btn { width: 100%; display: flex; align-items: center; gap: 14px; padding: 14px 20px; background: transparent; border: none; cursor: pointer; font-family: 'Geist', sans-serif; text-align: left; transition: background .15s; }
  .stage-btn:hover { background: var(--surface-alt); }
  .stage-btn.current { background: var(--accent-soft); }
  .stage-icon-circle { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }
  .stage-name { font-size: 14px; font-weight: 500; color: var(--ink); }
  .stage-team { font-size: 10px; padding: 2px 7px; border-radius: 5px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; }
  .stage-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .stage-editor { padding: 0 20px 20px 68px; background: var(--surface-alt); }
  .stage-editor-inner { padding: 18px; background: var(--surface); border-radius: 11px; margin-top: 10px; }
  
  /* Modal */
  .modal-bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(28, 25, 23, 0.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
  .modal { background: var(--surface); border-radius: 18px; padding: 28px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 500; margin: 0 0 4px; letter-spacing: -0.5px; color: var(--ink); }
  
  /* Misc */
  .fade-in { animation: fadeIn .3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .empty-state { padding: 50px 20px; text-align: center; color: var(--muted); font-size: 14px; }
  .empty-state-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.5; }
  
  /* Mobile */
  @media (max-width: 768px) {
    .sidebar { width: 100%; height: auto; position: relative; }
    .main { margin-left: 0; padding: 20px 16px; }
    .header h1 { font-size: 28px; }
    .login-title { font-size: 36px; }
  }


/* =========================
   PROMATH CRM UI UPGRADE
   Clean SaaS dashboard layer
   ========================= */
:root {
  --bg: #F5F7FB;
  --surface: #FFFFFF;
  --surface-alt: #F8FAFC;
  --ink: #101828;
  --ink-soft: #344054;
  --muted: #667085;
  --muted-soft: #98A2B3;
  --border: #E4E7EC;
  --border-soft: #EEF2F6;
  --accent: #175CD3;
  --accent-soft: #EFF4FF;
  --success: #067647;
  --success-soft: #ECFDF3;
  --warning: #B54708;
  --warning-soft: #FFFAEB;
  --info: #175CD3;
  --info-soft: #EFF4FF;
  --danger: #B42318;
  --danger-soft: #FEF3F2;
  --purple: #6941C6;
  --purple-soft: #F4F3FF;
  --shadow-xs: 0 1px 2px rgba(16, 24, 40, .05);
  --shadow-sm: 0 4px 14px rgba(16, 24, 40, .06);
  --shadow-md: 0 16px 40px rgba(16, 24, 40, .10);
}

body {
  background:
    radial-gradient(circle at 18% 5%, rgba(23, 92, 211, .10), transparent 28%),
    radial-gradient(circle at 84% 18%, rgba(105, 65, 198, .09), transparent 26%),
    var(--bg);
}

.app { align-items: stretch; }
.sidebar {
  width: 272px;
  padding: 22px 16px;
  background: linear-gradient(180deg, #0B1220 0%, #101828 100%);
  border-right: 0;
  box-shadow: 8px 0 30px rgba(16, 24, 40, .08);
}
.main {
  margin-left: 272px;
  padding: 30px 36px 48px;
  max-width: 1540px;
}
.sidebar .serif { color: #FFFFFF; }
.sidebar [style*="Sales CRM"] { color: rgba(255,255,255,.56) !important; }
.sidebar > div:first-child { border-bottom-color: rgba(255,255,255,.10) !important; }
.sidebar > div:last-child { border-top-color: rgba(255,255,255,.10) !important; }
.sidebar .nav-item { color: rgba(255,255,255,.70); border: 1px solid transparent; }
.sidebar .nav-item:hover:not(.active) { background: rgba(255,255,255,.08); color: #FFFFFF; }
.sidebar .nav-item.active { background: rgba(255,255,255,.12); color: #FFFFFF; border-color: rgba(255,255,255,.10); }
.sidebar .nav-badge { background: #2E90FA; }
.sidebar [style*="Logged in"] { color: rgba(255,255,255,.62) !important; }
.sidebar [style*="background:"] { box-shadow: inset 0 0 0 1px rgba(255,255,255,.04); }

.header {
  align-items: center;
  background: linear-gradient(135deg, #FFFFFF 0%, #F8FAFC 58%, #EFF4FF 100%);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 24px 26px;
  box-shadow: var(--shadow-sm);
}
.header h1 {
  font-size: 34px;
  letter-spacing: -1.1px;
}
.header .subtitle { color: var(--muted); }

.card, .stat-card, .role-card, .modal {
  border-radius: 20px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-xs);
}
.card { padding: 24px; }
.card:hover, .stat-card:hover { box-shadow: var(--shadow-sm); }
.stat-card {
  min-height: 118px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
}
.stat-card::after {
  content: '';
  position: absolute;
  width: 92px;
  height: 92px;
  right: -42px;
  top: -42px;
  background: var(--accent-soft);
  border-radius: 999px;
}
.stat-card .label { position: relative; z-index: 1; font-size: 10px; font-weight: 700; }
.stat-card .value { position: relative; z-index: 1; font-size: 30px; }

.btn-primary, .btn-secondary, .input, select.input, textarea.input {
  border-radius: 12px;
}
.btn-primary {
  background: linear-gradient(135deg, #175CD3, #1570EF);
  box-shadow: 0 8px 18px rgba(23, 92, 211, .22);
  padding: 11px 18px;
}
.btn-primary:hover { background: linear-gradient(135deg, #1849A9, #175CD3); transform: translateY(-1px); }
.btn-secondary { box-shadow: var(--shadow-xs); }
.input, select.input, textarea.input {
  border-color: #D0D5DD;
  background: #FFFFFF;
  min-height: 42px;
}
.input:focus { border-color: #2E90FA; box-shadow: 0 0 0 4px rgba(46,144,250,.13); }

.login-container { background: transparent; }
.login-inner {
  max-width: 980px;
  background: rgba(255,255,255,.72);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,.72);
  box-shadow: var(--shadow-md);
  border-radius: 32px;
  padding: 54px;
}
.login-badge { background: var(--accent-soft); }
.login-badge span { color: var(--accent); }
.login-badge .dot { background: var(--accent); }
.login-title { font-size: 56px; }
.role-card { padding: 26px; }
.role-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: #B2CCFF; }
.role-icon { box-shadow: inset 0 0 0 1px rgba(16,24,40,.04); }

.kanban-grid {
  grid-template-columns: repeat(auto-fit, minmax(185px, 1fr));
  gap: 14px;
}
.kanban-col {
  background: #F8FAFC;
  border: 1px solid var(--border-soft);
  min-height: 250px;
  padding: 14px;
}
.kanban-card {
  border-radius: 12px;
  padding: 12px;
  box-shadow: var(--shadow-xs);
}
.kanban-card:hover { border-color: #B2CCFF; box-shadow: var(--shadow-sm); }
.kanban-card-name { font-size: 13px; white-space: normal; line-height: 1.3; }
.kanban-card-loc { font-size: 11px; margin-top: 6px; }

.task-card {
  border-radius: 16px;
  padding: 16px;
  box-shadow: var(--shadow-xs);
}
.task-card:hover { border-color: #B2CCFF; box-shadow: var(--shadow-sm); }
.task-icon { background: var(--accent-soft); }
.task-name { font-size: 15px; }
.task-meta { font-size: 12px; }
.task-action { border-radius: 999px; background: var(--accent-soft); color: var(--accent); }

.table-wrap { border: 1px solid var(--border-soft); border-radius: 16px; overflow: auto; }
table { background: #FFFFFF; }
th { background: #F8FAFC; padding: 13px 14px; position: sticky; top: 0; z-index: 1; }
td { padding: 16px 14px; }
tr.row:hover { background: #F8FAFC; }
.pill { border-radius: 999px; background: #F2F4F7; padding: 5px 10px; }
.progress-bar { width: 92px; height: 7px; background: #EAECF0; }
.progress-fill { background: linear-gradient(90deg, #175CD3, #2E90FA); }

.notif { border-radius: 14px; background: #F8FAFC; padding: 13px; }
.notif.unread { background: var(--accent-soft); border-color: #B2CCFF; }
.notif-dot { background: #2E90FA; }

.stage-btn { padding: 18px 22px; }
.stage-btn:hover { background: #F8FAFC; }
.stage-btn.current { background: var(--accent-soft); }
.stage-icon-circle { border-radius: 12px; width: 38px; height: 38px; }
.stage-editor { background: #F8FAFC; padding: 0 22px 22px 76px; }
.stage-editor-inner { border: 1px solid var(--border-soft); border-radius: 16px; box-shadow: var(--shadow-xs); }
.stage-team { border-radius: 999px; padding: 3px 8px; }

.modal-bg { backdrop-filter: blur(8px); background: rgba(16,24,40,.48); }
.modal { box-shadow: var(--shadow-md); }
.empty-state { border: 1px dashed var(--border); border-radius: 18px; background: #F8FAFC; }

@media (max-width: 1120px) {
  .main [style*="minmax(0, 1fr) 300px"] { grid-template-columns: 1fr !important; }
  .main [style*="repeat(4,1fr)"] { grid-template-columns: repeat(2, 1fr) !important; }
  .main [style*="repeat(3,1fr)"] { grid-template-columns: repeat(2, 1fr) !important; }
}
@media (max-width: 768px) {
  .app { flex-direction: column; }
  .sidebar {
    width: 100%;
    height: auto;
    position: sticky;
    top: 0;
    z-index: 20;
    border-radius: 0 0 22px 22px;
  }
  .main { margin-left: 0; padding: 18px 14px 32px; }
  .header { padding: 20px; border-radius: 20px; }
  .header h1, .login-title { font-size: 30px; }
  .login-inner { padding: 28px; border-radius: 24px; }
  .kanban-grid { display: flex; overflow-x: auto; padding-bottom: 8px; }
  .kanban-col { min-width: 220px; }
  .stage-editor { padding: 0 12px 16px 12px; }
  .task-card { align-items: flex-start; }
  .task-action { margin-top: 6px; }
  .main [style*="repeat(3,1fr)"], .main [style*="repeat(4,1fr)"], .main [style*="1fr 1fr"], .main [style*="2fr 1fr"] { grid-template-columns: 1fr !important; }
}

</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// Storage shim: uses the Python/SQLite backend when served from server.py,
// and falls back to localStorage when opened as a normal local HTML file.
if (!window.storage) {
  window.storage = {
    async get(key) {
      if (location.protocol !== 'file:') {
        try {
          const res = await fetch('/api/storage/' + encodeURIComponent(key));
          if (res.ok) return await res.json();
          if (res.status !== 404) throw new Error('Storage API failed');
        } catch (err) {
          console.warn('Storage API unavailable, using localStorage fallback.', err);
        }
      }
      const value = localStorage.getItem(key);
      return value ? { value } : null;
    },
    async set(key, value) {
      if (location.protocol !== 'file:') {
        try {
          const res = await fetch('/api/storage/' + encodeURIComponent(key), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ value })
          });
          if (!res.ok) throw new Error('Storage API failed');
        } catch (err) {
          console.warn('Storage API unavailable, using localStorage fallback.', err);
        }
      }
      localStorage.setItem(key, value);
      return { key, value };
    }
  };
}

const newCollege = (data) => ({
  id: 'col_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
  name: data.name || '',

  academic_year: data.academic_year || '',

  contact_designation: data.contact_designation || '',
  phone: data.phone || '',
  email: data.email || '',
  location: data.location || '',
  total_students: data.total_students || '',
  current_status: data.current_status || '',
  additional_comments: data.additional_comments || '',
  created_at: new Date().toISOString(),
  stages: STAGES.reduce((acc, s) => { acc[s.id] = { status: 'not_started', data: {}, completed_at: null }; return acc; }, {}),
});

const defaultStages = () => STAGES.reduce((acc, s) => {
  acc[s.id] = { status: 'not_started', data: {}, completed_at: null };
  return acc;
}, {});

const normalizeCollege = (college) => ({
  ...college,
  stages: {
    ...defaultStages(),
    ...(college.stages || {}),
  },
});

const normalizeData = (data) => ({
  ...data,
  colleges: (data.colleges || []).map(normalizeCollege),
  notifications: data.notifications || [],
});

const getStageIdx = (c) => {
  let idx = 0;
  for (let i = 0; i < STAGES.length; i++) {
    if ((c.stages || {})[STAGES[i].id]?.status === 'completed') idx = i + 1;
    else break;
  }
  return Math.min(idx, STAGES.length - 1);
};

const getProgress = (c) => {
  const done = STAGES.filter(s => (c.stages || {})[s.id]?.status === 'completed').length;
  return Math.round((done / STAGES.length) * 100);
};

const formatDate = (iso) => iso ? new Date(iso).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) : '—';

const greeting = () => {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
};

function App() {
  const [role, setRole] = useState(null);
  const [data, setData] = useState({ colleges: [], notifications: [] });
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState('dashboard');
  const [selectedId, setSelectedId] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [showBulk, setShowBulk] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get('promath_crm_v13');
        if (res && res.value) {
          setData(normalizeData(JSON.parse(res.value)));
        } else {
          const init = normalizeData({ colleges: sampleData(), notifications: sampleNotifs() });
          setData(init);
          await window.storage.set('promath_crm_v13', JSON.stringify(init));
        }
      } catch (e) {
        const init = normalizeData({ colleges: sampleData(), notifications: sampleNotifs() });
        setData(init);
      }
      setLoading(false);
    })();
  }, []);

  const save = async (d) => {
    const normalized = normalizeData(d);
    setData(normalized);
    try { await window.storage.set('promath_crm_v13', JSON.stringify(normalized)); } catch (e) {}
  };

  const collegeApi = async (path, options = {}) => {
    const res = await fetch(path, {
      ...options,
      headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
    });
    if (!res.ok) throw new Error('College API failed: ' + res.status);
    return res.json();
  };

  const updateCollege = (id, fn) => {
    const existing = data.colleges.find(c => c.id === id);
    if (!existing) return;
    const updatedCollege = fn(existing);
    const nextData = { ...data, colleges: data.colleges.map(c => c.id === id ? updatedCollege : c) };
    setData(nextData);
    collegeApi('/api/colleges/' + encodeURIComponent(id), {
      method: 'PATCH',
      body: JSON.stringify(updatedCollege),
    }).catch(() => window.storage.set('promath_crm_v13', JSON.stringify(nextData)));
  };
  const addCollege = async (cd) => {
    try {
      const res = await collegeApi('/api/colleges', {
        method: 'POST',
        body: JSON.stringify({ college: cd }),
      });
      setData(res.data);
    } catch (e) {
      await save({ ...data, colleges: [newCollege(cd), ...data.colleges] });
    }
    setShowAdd(false);
  };
  const deleteCollege = async (id) => {
    const college = data.colleges.find(c => c.id === id);
    if (!college) return;
    if (!confirm('Delete "' + college.name + '"? This cannot be undone.')) return;
    const nextData = { ...data, colleges: data.colleges.filter(c => c.id !== id) };
    setData(nextData);
    try {
      const res = await collegeApi('/api/colleges/' + encodeURIComponent(id), { method: 'DELETE' });
      setData(res.data);
    } catch (e) {
      await window.storage.set('promath_crm_v13', JSON.stringify(nextData));
    }
    if (selectedId === id) { setSelectedId(null); setView('colleges'); }
  };
  const bulkAddColleges = async (rows) => {
    const existing = new Set(data.colleges.map(c => (c.name || '').trim().toLowerCase()));
    const incoming = rows
      .filter(r => r.name && !existing.has(r.name.trim().toLowerCase()))
      .map(r => r);
    if (incoming.length === 0) {
      alert('No new colleges found. Check duplicate names or file columns.');
      return;
    }
    try {
      const res = await collegeApi('/api/colleges/bulk', {
        method: 'POST',
        body: JSON.stringify({ colleges: incoming }),
      });
      setData(res.data);
      setShowBulk(false);
      alert(res.imported + ' colleges imported successfully. ' + res.skipped + ' skipped.');
    } catch (e) {
      const fallback = incoming.map(r => newCollege(r));
      await save({ ...data, colleges: [...fallback, ...data.colleges] });
      setShowBulk(false);
      alert(fallback.length + ' colleges imported successfully.');
    }
  };
  const addNotif = (n) => save({ ...data, notifications: [{ ...n, id: 'n' + Date.now(), timestamp: new Date().toISOString(), read: false }, ...data.notifications] });
  const markRead = (id) => save({ ...data, notifications: data.notifications.map(n => n.id === id ? { ...n, read: true } : n) });

  if (loading) return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)'}}>Loading…</div>;
  if (!role) return <Login onSelect={setRole} />;

  const selected = data.colleges.find(c => c.id === selectedId);
  
  return (
    <div className="app">
      <Sidebar role={role} view={view} setView={(v) => { setView(v); setSelectedId(null); }} onLogout={() => { setRole(null); setView('dashboard'); setSelectedId(null); }} data={data} />
      <main className="main">
        {view === 'dashboard' && (
          <Dashboard role={role} data={data} onSelect={(id) => { setSelectedId(id); setView('detail'); }} onAdd={() => setShowAdd(true)} markRead={markRead} updateCollege={updateCollege} />
        )}
        {view === 'colleges' && (
          <AllColleges role={role} data={data} onSelect={(id) => { setSelectedId(id); setView('detail'); }} onAdd={() => setShowAdd(true)} onBulk={() => setShowBulk(true)} updateCollege={updateCollege} deleteCollege={deleteCollege} />
        )}
        {view === 'detail' && selected && (
          <Detail college={selected} role={role} onBack={() => setView('colleges')} updateCollege={updateCollege} addNotif={addNotif} />
        )}
      </main>
      {showAdd && <AddModal onClose={() => setShowAdd(false)} onAdd={addCollege} />}
      {showBulk && <BulkUploadModal onClose={() => setShowBulk(false)} onImport={bulkAddColleges} />}
    </div>
  );
}

// ============ BILLING & ACCOUNTS ============
function BillingDash({ data, updateCollege }) {
  const [tab, setTab] = React.useState('quotations');
  const [docs, setDocs] = React.useState(() => {
    try { const d = localStorage.getItem('promath_billing_v2'); return d ? JSON.parse(d) : { quotations: [], invoices: [], proposals: [] }; }
    catch(e) { return { quotations: [], invoices: [], proposals: [] }; }
  });
  React.useEffect(() => {
    let active = true;
    (async () => {
      try {
        const res = await window.storage.get('promath_billing_v2');
        if (active && res && res.value) setDocs(JSON.parse(res.value));
      } catch(e) {}
    })();
    return () => { active = false; };
  }, []);
  const [showForm, setShowForm] = React.useState(false);
  const [editId, setEditId] = React.useState(null);
  const [form, setForm] = React.useState(null);

  const saveDocs = (d) => {
    setDocs(d);
    try { window.storage.set('promath_billing_v2', JSON.stringify(d)); } catch(e){}
  };

  const STATUSES = {
    quotations: [{v:'draft',l:'📝 Draft',c:'#6B7280',bg:'#F3F4F6'},{v:'sent',l:'📤 Sent',c:'#3B5AA3',bg:'#EBF0FA'},{v:'accepted',l:'✅ Accepted',c:'#2D7A4F',bg:'#E8F3EC'},{v:'rejected',l:'❌ Rejected',c:'#DC2626',bg:'#FEF2F2'},{v:'expired',l:'⏰ Expired',c:'#B8410A',bg:'#FFF7ED'}],
    invoices: [{v:'draft',l:'📝 Draft',c:'#6B7280',bg:'#F3F4F6'},{v:'sent',l:'📤 Sent',c:'#3B5AA3',bg:'#EBF0FA'},{v:'paid',l:'✅ Paid',c:'#2D7A4F',bg:'#E8F3EC'},{v:'overdue',l:'🔴 Overdue',c:'#DC2626',bg:'#FEF2F2'},{v:'partial',l:'🟡 Partial',c:'#B8410A',bg:'#FFF7ED'}],
    proposals: [{v:'draft',l:'📝 Draft',c:'#6B7280',bg:'#F3F4F6'},{v:'sent',l:'📤 Sent',c:'#3B5AA3',bg:'#EBF0FA'},{v:'accepted',l:'✅ Accepted',c:'#2D7A4F',bg:'#E8F3EC'},{v:'rejected',l:'❌ Rejected',c:'#DC2626',bg:'#FEF2F2'},{v:'revision',l:'🔄 Revision',c:'#6B46C1',bg:'#F2EDFB'}],
  };

  const TAB_INFO = {
    quotations: { label: 'Quotations', icon: '📋', prefix: 'QT' },
    invoices: { label: 'Invoices', icon: '🧾', prefix: 'INV' },
    proposals: { label: 'Proposals', icon: '📄', prefix: 'PR' },
  };

  const list = docs[tab] || [];
  const info = TAB_INFO[tab];
  const statuses = STATUSES[tab];

  const newForm = () => ({
    college: '',
    contact_person: '',
    date: new Date().toISOString().slice(0,10),
    valid_until: '',
    reference: info.prefix + '-' + String(list.length + 1).padStart(4, '0'),
    items: [{ description: 'Maths.Engineering Platform License', qty: '', rate: '', amount: '' }],
    subtotal: 0,
    gst: 18,
    total: 0,
    notes: '',
    status: 'draft',
    payment_terms: '',
    academic_year: '2025-2026',
  });

  const openCreate = () => { setForm(newForm()); setEditId(null); setShowForm(true); };
  const openEdit = (doc) => { setForm({...doc}); setEditId(doc.id); setShowForm(true); };

  const calcTotals = (items, gst) => {
    const subtotal = items.reduce((s, i) => s + (parseFloat(i.amount) || 0), 0);
    const gstAmt = subtotal * (parseFloat(gst) || 0) / 100;
    return { subtotal, total: subtotal + gstAmt };
  };

  const updItem = (idx, field, val) => {
    const items = [...form.items];
    items[idx] = { ...items[idx], [field]: val };
    if (field === 'qty' || field === 'rate') {
      items[idx].amount = ((parseFloat(items[idx].qty) || 0) * (parseFloat(items[idx].rate) || 0)).toFixed(2);
    }
    const { subtotal, total } = calcTotals(items, form.gst);
    setForm({ ...form, items, subtotal, total });
  };

  const addItem = () => setForm({ ...form, items: [...form.items, { description: '', qty: '', rate: '', amount: '' }] });
  const removeItem = (idx) => {
    const items = form.items.filter((_, i) => i !== idx);
    const { subtotal, total } = calcTotals(items, form.gst);
    setForm({ ...form, items, subtotal, total });
  };

  const saveDoc = () => {
    if (!form.college || !form.date) { alert('College and date are required'); return; }
    const { subtotal, total } = calcTotals(form.items, form.gst);
    const doc = { ...form, subtotal, total, id: editId || (tab.slice(0,3) + '_' + Date.now()), updated_at: new Date().toISOString() };
    if (!editId) doc.created_at = new Date().toISOString();
    const updated = editId ? list.map(d => d.id === editId ? doc : d) : [doc, ...list];
    saveDocs({ ...docs, [tab]: updated });
    setShowForm(false); setForm(null); setEditId(null);
  };

  const deleteDoc = (id) => {
    if (!confirm('Delete this ' + tab.slice(0,-1) + '?')) return;
    saveDocs({ ...docs, [tab]: list.filter(d => d.id !== id) });
  };

  const updateStatus = (id, status) => {
    saveDocs({ ...docs, [tab]: list.map(d => d.id === id ? { ...d, status, updated_at: new Date().toISOString() } : d) });
  };

  const downloadDoc = (doc) => {
    const type = tab.slice(0,-1).toUpperCase();
    let html = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>' + type + ' - ' + doc.reference + '</title>';
    html += '<style>body{font-family:Arial,sans-serif;max-width:800px;margin:40px auto;padding:20px;color:#333}';
    html += '.header{display:flex;justify-content:space-between;margin-bottom:30px;padding-bottom:20px;border-bottom:3px solid #175CD3}';
    html += '.logo{font-size:24px;font-weight:bold;color:#175CD3}.doc-type{font-size:28px;font-weight:bold;color:#333;text-align:right}';
    html += '.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:30px}';
    html += '.info-box{padding:15px;background:#f8f9fa;border-radius:8px}.info-box h4{margin:0 0 8px;color:#666;font-size:12px;text-transform:uppercase}';
    html += '.info-box p{margin:0;font-size:14px}';
    html += 'table{width:100%;border-collapse:collapse;margin-bottom:20px}th{background:#175CD3;color:white;padding:10px;text-align:left;font-size:12px}';
    html += 'td{padding:10px;border-bottom:1px solid #eee;font-size:13px}.right{text-align:right}';
    html += '.totals{margin-left:auto;width:300px}.totals tr td{padding:6px 10px;font-size:13px}.totals .grand{font-size:16px;font-weight:bold;border-top:2px solid #333}';
    html += '.notes{margin-top:30px;padding:15px;background:#f0f7ff;border-radius:8px;font-size:13px}';
    html += '.footer{margin-top:40px;text-align:center;color:#999;font-size:11px;border-top:1px solid #eee;padding-top:15px}';
    html += '@media print{body{margin:0;padding:20px}}</style></head><body>';
    html += '<div class="header"><div class="logo">Maths.Engineering<br><span style="font-size:12px;color:#666;font-weight:normal">Promath Technology Pvt. Ltd.</span></div>';
    html += '<div class="doc-type">' + type + '<br><span style="font-size:14px;color:#666">' + doc.reference + '</span></div></div>';
    html += '<div class="info-grid">';
    html += '<div class="info-box"><h4>Bill To</h4><p><strong>' + doc.college + '</strong></p><p>' + (doc.contact_person || '') + '</p></div>';
    html += '<div class="info-box"><h4>Details</h4><p>Date: ' + doc.date + '</p>';
    if (doc.valid_until) html += '<p>Valid Until: ' + doc.valid_until + '</p>';
    html += '<p>Academic Year: ' + (doc.academic_year || '') + '</p></div></div>';
    html += '<table><thead><tr><th>#</th><th>Description</th><th class="right">Qty</th><th class="right">Rate (₹)</th><th class="right">Amount (₹)</th></tr></thead><tbody>';
    doc.items.forEach((item, i) => {
      html += '<tr><td>' + (i+1) + '</td><td>' + item.description + '</td><td class="right">' + item.qty + '</td><td class="right">' + parseFloat(item.rate||0).toLocaleString('en-IN') + '</td><td class="right">' + parseFloat(item.amount||0).toLocaleString('en-IN') + '</td></tr>';
    });
    html += '</tbody></table>';
    html += '<table class="totals"><tr><td>Subtotal</td><td class="right">₹ ' + doc.subtotal.toLocaleString('en-IN') + '</td></tr>';
    html += '<tr><td>GST (' + doc.gst + '%)</td><td class="right">₹ ' + (doc.subtotal * doc.gst / 100).toLocaleString('en-IN') + '</td></tr>';
    html += '<tr class="grand"><td>Total</td><td class="right">₹ ' + doc.total.toLocaleString('en-IN') + '</td></tr></table>';
    if (doc.notes) html += '<div class="notes"><strong>Notes:</strong> ' + doc.notes + '</div>';
    if (doc.payment_terms) html += '<div class="notes"><strong>Payment Terms:</strong> ' + doc.payment_terms + '</div>';
    html += '<div class="footer">Promath Technology Pvt. Ltd. | Maths.Engineering | Generated on ' + new Date().toLocaleDateString('en-IN') + '</div>';
    html += '</body></html>';
    const blob = new Blob([html], {type:'text/html'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = doc.reference + '_' + doc.college.replace(/[^a-zA-Z0-9]/g,'_') + '.html';
    a.click();
    URL.revokeObjectURL(url);
  };

  const inp = {width:'100%',padding:'7px 10px',borderRadius:'7px',border:'1px solid var(--border)',fontSize:'12px',background:'white',color:'var(--ink)',outline:'none',boxSizing:'border-box'};
  const lbl = {fontSize:'11px',fontWeight:600,color:'var(--muted)',marginBottom:'4px',display:'block'};
  const tabStyle = (t) => ({padding:'8px 18px',borderRadius:'8px',border:'none',cursor:'pointer',fontSize:'13px',fontWeight:500,background:tab===t?'var(--accent)':'transparent',color:tab===t?'white':'var(--muted)',transition:'all 0.15s'});

  // Stats
  const totalVal = list.reduce((s,d) => s + (d.total||0), 0);
  const draftCount = list.filter(d => d.status === 'draft').length;
  const sentCount = list.filter(d => d.status === 'sent').length;
  const acceptedPaidCount = list.filter(d => d.status === 'accepted' || d.status === 'paid').length;

  return (
    <div className="fade-in">
      <div className="header">
        <div><h1>Billing & Accounts</h1><div className="subtitle">Quotations, invoices & proposals</div></div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'14px',marginBottom:'24px'}}>
        <Stat label="Total Documents" value={list.length} icon="📄" />
        <Stat label="Draft" value={draftCount} icon="📝" />
        <Stat label="Sent" value={sentCount} icon="📤" />
        <Stat label={'Total Value'} value={'₹' + Math.round(totalVal).toLocaleString('en-IN')} icon="💰" />
      </div>

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'20px'}}>
        <div style={{display:'flex',gap:'6px',background:'var(--surface)',borderRadius:'10px',padding:'5px',width:'fit-content'}}>
          {Object.entries(TAB_INFO).map(([k,v]) => (
            <button key={k} style={tabStyle(k)} onClick={() => {setTab(k);setShowForm(false);}}>{v.icon} {v.label}</button>
          ))}
        </div>
        {tab !== 'proposals' && (
          <button onClick={openCreate} style={{padding:'8px 18px',borderRadius:'8px',border:'none',background:'var(--accent)',color:'white',fontSize:'13px',fontWeight:600,cursor:'pointer'}}>
            + Create {info.label.slice(0,-1)}
          </button>
        )}
      </div>

      {/* PROPOSAL GENERATOR */}
      {tab === 'proposals' ? <ProposalGenerator data={data} docs={docs} saveDocs={saveDocs} /> : <>

      {/* CREATE / EDIT FORM */}
      {showForm && form && (
        <div className="card" style={{marginBottom:'20px',border:'2px solid var(--accent)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
            <div className="serif" style={{fontSize:'17px',fontWeight:600}}>{editId ? 'Edit' : 'New'} {info.label.slice(0,-1)}</div>
            <button onClick={() => {setShowForm(false);setForm(null);setEditId(null);}} style={{padding:'4px 10px',borderRadius:'6px',border:'1px solid var(--border)',background:'white',cursor:'pointer',fontSize:'12px',color:'var(--muted)'}}>✕ Close</button>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'12px',marginBottom:'14px'}}>
            <div>
              <label style={lbl}>College Name *</label>
              <select style={inp} value={form.college} onChange={e => setForm({...form, college: e.target.value})}>
                <option value="">— Select college —</option>
                {data.colleges.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}
              </select>
            </div>
            <div><label style={lbl}>Contact Person</label><input style={inp} value={form.contact_person} onChange={e => setForm({...form, contact_person: e.target.value})} placeholder="Dr. ABC" /></div>
            <div><label style={lbl}>Reference No</label><input style={inp} value={form.reference} onChange={e => setForm({...form, reference: e.target.value})} /></div>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'12px',marginBottom:'14px'}}>
            <div><label style={lbl}>Date *</label><input type="date" style={inp} value={form.date} onChange={e => setForm({...form, date: e.target.value})} /></div>
            <div><label style={lbl}>Valid Until</label><input type="date" style={inp} value={form.valid_until} onChange={e => setForm({...form, valid_until: e.target.value})} /></div>
            <div><label style={lbl}>Academic Year</label>
              <select style={inp} value={form.academic_year} onChange={e => setForm({...form, academic_year: e.target.value})}>
                <option value="2024-2025">2024 – 2025</option>
                <option value="2025-2026">2025 – 2026</option>
                <option value="2026-2027">2026 – 2027</option>
              </select>
            </div>
          </div>

          {/* Line Items */}
          <div style={{marginBottom:'14px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
              <label style={{...lbl,marginBottom:0}}>Line Items</label>
              <button onClick={addItem} style={{padding:'4px 10px',borderRadius:'6px',border:'1px solid var(--accent)',background:'white',color:'var(--accent)',fontSize:'11px',fontWeight:600,cursor:'pointer'}}>+ Add Item</button>
            </div>
            <div style={{border:'1px solid var(--border)',borderRadius:'8px',overflow:'hidden'}}>
              <div style={{display:'grid',gridTemplateColumns:'3fr 1fr 1fr 1fr 40px',gap:'0',background:'var(--surface)',padding:'8px 12px'}}>
                <div style={{fontSize:'11px',fontWeight:600,color:'var(--muted)'}}>Description</div>
                <div style={{fontSize:'11px',fontWeight:600,color:'var(--muted)',textAlign:'right'}}>Qty</div>
                <div style={{fontSize:'11px',fontWeight:600,color:'var(--muted)',textAlign:'right'}}>Rate (₹)</div>
                <div style={{fontSize:'11px',fontWeight:600,color:'var(--muted)',textAlign:'right'}}>Amount (₹)</div>
                <div></div>
              </div>
              {form.items.map((item, idx) => (
                <div key={idx} style={{display:'grid',gridTemplateColumns:'3fr 1fr 1fr 1fr 40px',gap:'8px',padding:'8px 12px',borderTop:'1px solid var(--border)',alignItems:'center'}}>
                  <input style={{...inp,border:'none',padding:'4px 0'}} value={item.description} onChange={e => updItem(idx,'description',e.target.value)} placeholder="Item description" />
                  <input type="number" style={{...inp,border:'none',padding:'4px 0',textAlign:'right'}} value={item.qty} onChange={e => updItem(idx,'qty',e.target.value)} placeholder="0" />
                  <input type="number" style={{...inp,border:'none',padding:'4px 0',textAlign:'right'}} value={item.rate} onChange={e => updItem(idx,'rate',e.target.value)} placeholder="0" />
                  <div style={{textAlign:'right',fontSize:'13px',fontWeight:600,color:'var(--ink)'}}>₹{parseFloat(item.amount||0).toLocaleString('en-IN')}</div>
                  {form.items.length > 1 && <button onClick={() => removeItem(idx)} style={{padding:'2px 6px',borderRadius:'4px',border:'none',background:'#FEF2F2',color:'#DC2626',fontSize:'11px',cursor:'pointer'}}>✕</button>}
                </div>
              ))}
            </div>
          </div>

          {/* Totals */}
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:'14px'}}>
            <div style={{width:'280px'}}>
              <div style={{display:'flex',justifyContent:'space-between',padding:'6px 0',fontSize:'13px',color:'var(--muted)'}}>
                <span>Subtotal</span><span>₹ {calcTotals(form.items, form.gst).subtotal.toLocaleString('en-IN')}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',padding:'6px 0',fontSize:'13px',color:'var(--muted)',alignItems:'center'}}>
                <span>GST</span>
                <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                  <input type="number" style={{...inp,width:'60px',textAlign:'right'}} value={form.gst} onChange={e => setForm({...form, gst: parseFloat(e.target.value)||0})} />
                  <span>%</span>
                </div>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',padding:'8px 0',fontSize:'16px',fontWeight:700,color:'var(--ink)',borderTop:'2px solid var(--ink)'}}>
                <span>Total</span><span>₹ {calcTotals(form.items, form.gst).total.toLocaleString('en-IN')}</span>
              </div>
            </div>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginBottom:'14px'}}>
            <div><label style={lbl}>Notes</label><textarea style={{...inp,minHeight:'60px',resize:'vertical'}} value={form.notes} onChange={e => setForm({...form, notes: e.target.value})} placeholder="Additional notes or terms..." /></div>
            <div><label style={lbl}>Payment Terms</label><textarea style={{...inp,minHeight:'60px',resize:'vertical'}} value={form.payment_terms} onChange={e => setForm({...form, payment_terms: e.target.value})} placeholder="e.g. 50% advance, 50% on delivery..." /></div>
          </div>

          <div style={{display:'flex',gap:'8px',justifyContent:'flex-end'}}>
            <button onClick={() => {setShowForm(false);setForm(null);setEditId(null);}} style={{padding:'9px 18px',borderRadius:'8px',border:'1px solid var(--border)',background:'white',fontSize:'13px',cursor:'pointer',color:'var(--muted)'}}>Cancel</button>
            <button onClick={saveDoc} style={{padding:'9px 22px',borderRadius:'8px',border:'none',background:'var(--accent)',color:'white',fontSize:'13px',fontWeight:600,cursor:'pointer'}}>💾 Save {info.label.slice(0,-1)}</button>
          </div>
        </div>
      )}

      {/* DOCUMENT LIST */}
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        {list.length === 0 ? (
          <div className="empty-state" style={{padding:'40px'}}><div className="empty-state-icon">{info.icon}</div>No {tab} yet. Click "+ Create" to get started.</div>
        ) : (
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px'}}>
            <thead>
              <tr style={{background:'var(--surface)'}}>
                <th style={{padding:'10px 14px',textAlign:'left',fontWeight:600,color:'var(--muted)',borderBottom:'1px solid var(--border)'}}>Ref</th>
                <th style={{padding:'10px 14px',textAlign:'left',fontWeight:600,color:'var(--muted)',borderBottom:'1px solid var(--border)'}}>College</th>
                <th style={{padding:'10px 14px',textAlign:'left',fontWeight:600,color:'var(--muted)',borderBottom:'1px solid var(--border)'}}>Date</th>
                <th style={{padding:'10px 14px',textAlign:'right',fontWeight:600,color:'var(--muted)',borderBottom:'1px solid var(--border)'}}>Amount</th>
                <th style={{padding:'10px 14px',textAlign:'center',fontWeight:600,color:'var(--muted)',borderBottom:'1px solid var(--border)'}}>Status</th>
                <th style={{padding:'10px 14px',textAlign:'center',fontWeight:600,color:'var(--muted)',borderBottom:'1px solid var(--border)'}}>Actions</th>
              </tr>
            </thead>
            <tbody>
              {list.map(doc => {
                const st = statuses.find(s => s.v === doc.status) || statuses[0];
                return (
                  <tr key={doc.id} style={{borderBottom:'1px solid var(--border)'}}>
                    <td style={{padding:'10px 14px',fontWeight:600,color:'var(--accent)'}}>{doc.reference}</td>
                    <td style={{padding:'10px 14px',color:'var(--ink)',fontWeight:500}}>{doc.college}<br/><span style={{fontSize:'10px',color:'var(--muted)'}}>{doc.contact_person||''}</span></td>
                    <td style={{padding:'10px 14px',color:'var(--muted)'}}>{doc.date}{doc.valid_until ? <><br/><span style={{fontSize:'10px'}}>Valid till: {doc.valid_until}</span></> : ''}</td>
                    <td style={{padding:'10px 14px',textAlign:'right',fontWeight:600,color:'var(--ink)'}}>₹{Math.round(doc.total||0).toLocaleString('en-IN')}</td>
                    <td style={{padding:'10px 14px',textAlign:'center'}}>
                      <select value={doc.status} onChange={e => updateStatus(doc.id, e.target.value)}
                        style={{padding:'4px 8px',borderRadius:'6px',border:'1px solid '+st.c+'44',background:st.bg,color:st.c,fontSize:'11px',fontWeight:600,cursor:'pointer'}}>
                        {statuses.map(s => <option key={s.v} value={s.v}>{s.l}</option>)}
                      </select>
                    </td>
                    <td style={{padding:'10px 14px',textAlign:'center'}}>
                      <div style={{display:'flex',gap:'4px',justifyContent:'center'}}>
                        <button onClick={() => openEdit(doc)} style={{padding:'4px 8px',borderRadius:'5px',border:'1px solid var(--border)',background:'white',fontSize:'10px',cursor:'pointer',color:'var(--ink)'}}>✏️ Edit</button>
                        <button onClick={() => downloadDoc(doc)} style={{padding:'4px 8px',borderRadius:'5px',border:'1px solid var(--accent)',background:'white',fontSize:'10px',cursor:'pointer',color:'var(--accent)'}}>📥 Download</button>
                        <button onClick={() => deleteDoc(doc.id)} style={{padding:'4px 8px',borderRadius:'5px',border:'1px solid #FECACA',background:'#FEF2F2',fontSize:'10px',cursor:'pointer',color:'#DC2626'}}>🗑</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
      </>}
    </div>
  );
}

// ============ PROPOSAL GENERATOR ============
function ProposalGenerator({ data, docs, saveDocs }) {
  const [pf, setPf] = React.useState({
    college: '', address: '', quote_no: 'B2B - TN - ' + String((docs.proposals||[]).length + 1).padStart(4,'0'),
    quote_date: new Date().toISOString().slice(0,10), type: 'with_app',
    m1_price: '500', m2_price: '500', m3_price: '600',
    m1_year: '2025-2026', m2_year: '2025-2026', m3_year: '2025-2026',
    include_m3: true, status: 'draft',
  });
  const [saved, setSaved] = React.useState(false);
  const [propList, setPropList] = React.useState(docs.proposals || []);

  React.useEffect(() => { setPropList(docs.proposals || []); }, [docs]);

  const saveProp = () => {
    if (!pf.college) { alert('College name is required'); return; }
    const prop = { ...pf, id: 'pr_' + Date.now(), reference: pf.quote_no, total: 0, created_at: new Date().toISOString(), updated_at: new Date().toISOString() };
    const updated = [prop, ...propList];
    saveDocs({ ...docs, proposals: updated });
    setSaved(true); setTimeout(() => setSaved(false), 3000);
  };

  const deleteProp = (id) => {
    if (!confirm('Delete this proposal?')) return;
    saveDocs({ ...docs, proposals: (docs.proposals||[]).filter(d => d.id !== id) });
  };

  const updatePropStatus = (id, status) => {
    saveDocs({ ...docs, proposals: (docs.proposals||[]).map(d => d.id === id ? { ...d, status, updated_at: new Date().toISOString() } : d) });
  };

  const downloadProposal = (p) => {
    const col = p.college;
    const addr = p.address || '';
    const withApp = p.type === 'with_app';

    rows += '<tr><td style="padding:12px;border:1px solid #ddd;text-align:center">2</td><td style="padding:12px;border:1px solid #ddd">Second Semester - M2</td><td style="padding:12px;border:1px solid #ddd;text-align:center">' + (p.m2_year||'2025-2026') + '</td><td style="padding:12px;border:1px solid #ddd;text-align:center">' + (p.m2_price||'***') + '</td></tr>';
    if (p.include_m3) rows += '<tr><td style="padding:12px;border:1px solid #ddd;text-align:center">3</td><td style="padding:12px;border:1px solid #ddd">Third Semester - M3</td><td style="padding:12px;border:1px solid #ddd;text-align:center">' + (p.m3_year||'2025-2026') + '</td><td style="padding:12px;border:1px solid #ddd;text-align:center">' + (p.m3_price||'***') + '</td></tr>';

    html += '@media print{.page{page-break-after:always}.footer-bar{position:fixed;bottom:0}}</style></head><body>';

    // PAGE 1
    html += '<div class="page"><div class="header"><div><div class="logo-text">PROMATH TECHNOLOGY PVT LTD</div><div class="logo-sub">3/4, 3rd Floor, Rams Apartments,<br>No.40, Vijayaraghava Road,<br>T.Nagar, Chennai - 600017.<br>+91 93609 22729<br>support@maths.engineering</div></div>';
    html += '<div class="brand-badge">MATHS<br>ENGINEERING<br><span style="font-size:11px;color:#666">www.maths.engineering</span></div></div>';
    html += '<div class="quote-info">QUOTE NO.: ' + p.quote_no + '<br>QUOTE DT.: ' + p.quote_date + '</div>';
    html += '<div class="to-section"><strong>To:</strong><br>' + col + ',<br>' + (addr || 'Address.') + '</div>';

function getEngStage(c) {
  const ej = c.engagement_journey || {};
  if (ej.current_stage) return ej.current_stage;
  if (c.stages.orientation.status === 'completed') return 'onboarding';
  return null;
}

function getStepsDone(c, stageId) {
  return ((c.engagement_journey || {}).steps || {})[stageId] || {};
}

function EngageDash({ data, onSelect, updateCollege }) {

  const engColleges = data.colleges.filter(c =>
    c.stages.mou_signing.status === 'completed' ||
    c.stages.syllabus_submission.status === 'completed' ||
    c.stages.license_creation.status === 'completed' ||
    c.stages.orientation.status === 'completed'
  );

  const byStage = (stageId) => engColleges.filter(c => getEngStage(c) === stageId);

  // Last action date helper — finds most recent step completion date
  const getLastAction = (c) => {
    const allSteps = Object.values((c.engagement_journey||{}).steps||{});
    const dates = allSteps.flatMap(s => Object.values(s)).filter(v => typeof v === 'string' && v.match(/^\d{4}-\d{2}-\d{2}/));
    if (!dates.length) return null;
    return dates.sort().reverse()[0];
  };
  const daysSince = (dateStr) => {
    if (!dateStr) return null;
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 86400000);
    return diff;
  };

  // Move college to a new engagement stage
  const moveStage = (collegeId, stageId) => {
    updateCollege(collegeId, c => ({
      ...c,
      engagement_journey: {
        ...(c.engagement_journey || {}),
        current_stage: stageId,
        steps: (c.engagement_journey || {}).steps || {},
      }
    }));
