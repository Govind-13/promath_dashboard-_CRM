function CollegeTable({ colleges, onSelect, updateCollege, deleteCollege }) {
  const [editingId, setEditingId] = React.useState(null);
  const [editName, setEditName] = React.useState('');
  const startEdit = (e, c) => { e.stopPropagation(); setEditingId(c.id); setEditName(c.name); };
  const saveEdit = (e) => { e.stopPropagation(); if(updateCollege && editName.trim()) { updateCollege(editingId, c=>({...c, name: editName.trim()})); } setEditingId(null); };
  const cancelEdit = (e) => { e.stopPropagation(); setEditingId(null); };
  return (
    <div className="table-wrap">
      <table>
        <thead><tr><th>College</th><th>Contact</th><th>Current Stage</th><th>Progress</th><th>Actions</th></tr></thead>
        <tbody>
          {colleges.map(c => {
            const stage = STAGES[getStageIdx(c)];
            const p = getProgress(c);
            return (
              <tr key={c.id} className="row" onClick={() => onSelect(c.id)}>
                <td>
                  {editingId === c.id ? (
                    <div style={{display:'flex',gap:'4px',alignItems:'center'}} onClick={e=>e.stopPropagation()}>
                      <input value={editName} onChange={e=>setEditName(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')saveEdit(e);if(e.key==='Escape')cancelEdit(e);}}
                        style={{padding:'4px 8px',borderRadius:'5px',border:'1px solid var(--accent)',fontSize:'13px',fontWeight:500,color:'var(--ink)',outline:'none',width:'100%'}} autoFocus />
                      <button onClick={saveEdit} style={{padding:'3px 8px',borderRadius:'4px',border:'none',background:'var(--accent)',color:'white',fontSize:'11px',cursor:'pointer',flexShrink:0}}>✓</button>
                      <button onClick={cancelEdit} style={{padding:'3px 8px',borderRadius:'4px',border:'1px solid var(--border)',background:'white',fontSize:'11px',cursor:'pointer',color:'var(--muted)',flexShrink:0}}>✕</button>
                    </div>
                  ) : (
                    <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                      <div style={{fontWeight:500,color:'var(--ink)',flex:1}}>{c.name}</div>
                      {updateCollege && <button onClick={e=>startEdit(e,c)} style={{padding:'2px 6px',borderRadius:'4px',border:'1px solid var(--border)',background:'white',fontSize:'10px',cursor:'pointer',color:'var(--muted)',flexShrink:0,opacity:0.5}} onMouseEnter={e=>e.target.style.opacity=1} onMouseLeave={e=>e.target.style.opacity=0.5}>✏️</button>}
                    </div>
                  )}
                  <div style={{fontSize:'11px',color:'var(--muted)',marginTop:'2px'}}>{c.location} · {c.total_students||'?'} students</div>
                </td>
                <td><div>{c.contact_name}</div><div style={{fontSize:'11px',color:'var(--muted)',marginTop:'2px'}}>{c.contact_designation}</div></td>
                <td><span className="pill">{stage.label}</span></td>
                <td><span className="progress-bar"><span className="progress-fill" style={{width: p + '%', background: p===100?'var(--success)':'var(--accent)'}}></span></span> <span className="mono" style={{fontSize:'11px',color:'var(--muted)',marginLeft:'6px'}}>{p}%</span></td>
                <td>{deleteCollege && <button onClick={(e) => { e.stopPropagation(); deleteCollege(c.id); }} title="Delete college" style={{padding:'5px 9px',borderRadius:'6px',border:'1px solid #FECACA',background:'#FEF2F2',color:'#B42318',fontSize:'11px',fontWeight:600,cursor:'pointer',marginRight:'8px'}}>Delete</button>}<span style={{color:'var(--muted)'}}>›</span></td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ============ ALL COLLEGES ============
function AllColleges({ role, data, onSelect, onAdd, onBulk, updateCollege, deleteCollege }) {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  
  let cols = data.colleges;
  if (role === 'content') cols = cols.filter(c => c.stages.syllabus_submission.status === 'completed');
  else if (role === 'implementation') cols = cols.filter(c => c.stages.student_data.status === 'completed' || c.stages.license_creation.status === 'completed');
  else if (role === 'engagement') cols = cols.filter(c => c.stages.impl_feedback.status === 'completed' || c.stages.orientation.status === 'completed');
  
  if (search) cols = cols.filter(c => [c.name, c.contact_name, c.location].some(v => (v||'').toLowerCase().includes(search.toLowerCase())));
  if (filter !== 'all') cols = cols.filter(c => STAGES[getStageIdx(c)]?.group === filter);
  
  return (
    <div className="fade-in">
      <div className="header">
        <div>
          <h1>{role === 'admin' ? 'All Colleges' : 'My Assignments'}</h1>
          <div className="subtitle">{cols.length} {cols.length === 1 ? 'college' : 'colleges'}</div>
        </div>
        {role === 'admin' && (
          <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
            <button className="btn-secondary" onClick={onBulk}>Bulk Upload</button>
            <button className="btn-primary" onClick={onAdd}>+ Add College</button>
          </div>
        )}
      </div>
      <div className="card">
        <div style={{display:'flex',gap:'10px',marginBottom:'16px',flexWrap:'wrap'}}>
          <input className="input" placeholder="Search..." value={search} onChange={e => setSearch(e.target.value)} style={{flex:1,minWidth:'200px'}} />
          {role === 'admin' && (
            <select className="input" style={{width:'auto'}} value={filter} onChange={e => setFilter(e.target.value)}>
              <option value="all">All Stages</option>
              <option value="Discovery">Discovery</option>
              <option value="Deal">Deal</option>
              <option value="Content">Content</option>
              <option value="Implementation">Implementation</option>
              <option value="Onboarding">Onboarding</option>
            </select>
          )}
        </div>
        {cols.length === 0 ? <div className="empty-state">No colleges found</div> : <CollegeTable colleges={cols} onSelect={onSelect} updateCollege={updateCollege} deleteCollege={role === 'admin' ? deleteCollege : null} />}
      </div>
    </div>
  );
}

// ============ DETAIL VIEW ============
function Detail({ college, role, onBack, updateCollege, addNotif }) {
  const [expanded, setExpanded] = useState(null);
  const p = getProgress(college);
  const curIdx = getStageIdx(college);
  
  const canEdit = (s) => role === 'admin' || s.team === role;
  
  const updateStage = (sid, updates) => {
    updateCollege(college.id, c => ({ ...c, stages: { ...c.stages, [sid]: { ...c.stages[sid], ...updates } } }));
  };
  
  const completeStage = (sid, data, msg) => {
    updateStage(sid, { status: 'completed', completed_at: new Date().toISOString(), data: { ...college.stages[sid].data, ...data } });
    if (msg && role !== 'admin') addNotif({ role: 'admin', message: college.name + ': ' + msg });
    setExpanded(null);
  };
  
  return (
    <div className="fade-in">
      <button className="btn-secondary" onClick={onBack} style={{marginBottom:'18px',border:'none',background:'transparent',padding:'4px 0',color:'var(--muted)'}}>← Back</button>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:'16px',flexWrap:'wrap',marginBottom:'22px'}}>
        <div>
          <h1 className="serif" style={{fontSize:'32px',fontWeight:500,margin:'0 0 8px',letterSpacing:'-0.8px'}}>{college.name}</h1>
          <div style={{display:'flex',gap:'14px',flexWrap:'wrap',fontSize:'13px',color:'var(--ink-soft)'}}>
            <span>👤 {college.contact_name} · {college.contact_designation}</span>
            <span>📍 {college.location}</span>
            {college.phone && <span>📞 {college.phone}</span>}
            {college.email && <span>✉️ {college.email}</span>}
          </div>
        </div>
        <div style={{textAlign:'right'}}>
          <div className="serif" style={{fontSize:'42px',fontWeight:500,color:'var(--accent)',lineHeight:1}}>{p}%</div>
          <div style={{fontSize:'11px',color:'var(--muted)',marginTop:'3px',textTransform:'uppercase',letterSpacing:'0.5px'}}>Complete</div>
        </div>
      </div>
      
      <div style={{height:'7px',background:'var(--surface-alt)',borderRadius:'999px',overflow:'hidden',marginBottom:'24px'}}>
        <div style={{width: p + '%', height:'100%', background:'linear-gradient(90deg, var(--accent), #DC6610)', transition:'width 0.5s'}}></div>
      </div>
      
      {/* Current Status & Additional Comments */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'14px',marginBottom:'20px'}}>
        <div className="card" style={{padding:'14px 18px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px'}}>
            <div style={{fontSize:'12px',fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.5px'}}>📋 Current Status</div>
          </div>
          <textarea value={college.current_status||''} onChange={e => updateCollege(college.id, c => ({...c, current_status: e.target.value}))}
            style={{width:'100%',minHeight:'70px',padding:'8px 10px',borderRadius:'7px',border:'1px solid var(--border)',fontSize:'12px',background:'white',color:'var(--ink)',outline:'none',resize:'vertical',lineHeight:1.5,boxSizing:'border-box'}}
            placeholder="Enter current status of this college..." />
        </div>
        <div className="card" style={{padding:'14px 18px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px'}}>
            <div style={{fontSize:'12px',fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.5px'}}>💬 Additional Comments</div>
          </div>
          <textarea value={college.additional_comments||''} onChange={e => updateCollege(college.id, c => ({...c, additional_comments: e.target.value}))}
            style={{width:'100%',minHeight:'70px',padding:'8px 10px',borderRadius:'7px',border:'1px solid var(--border)',fontSize:'12px',background:'white',color:'var(--ink)',outline:'none',resize:'vertical',lineHeight:1.5,boxSizing:'border-box'}}
            placeholder="Add any additional comments or notes..." />
        </div>
      </div>
      
      <div className="card" style={{padding:0}}>
        <div style={{padding:'18px 22px',borderBottom:'1px solid var(--border)'}}>
          <div className="serif" style={{fontSize:'19px',fontWeight:500}}>Pipeline Stages</div>
          <div style={{fontSize:'12px',color:'var(--muted)',marginTop:'2px'}}>
            {role === 'admin' ? 'Click any stage to view or update' : 'You can edit stages assigned to ' + ROLES[role].label}
          </div>
        </div>
        {STAGES.map((s, idx) => {
          const sd = college.stages[s.id];
          const isExp = expanded === s.id;
          const done = sd.status === 'completed';
          const prog = sd.status === 'in_progress';
          const cur = idx === curIdx;
          const ce = canEdit(s);
          
          return (
            <div key={s.id} className="stage-row">
              <button className={'stage-btn' + (cur && !done ? ' current' : '')} onClick={() => setExpanded(isExp ? null : s.id)}>
                <div className="stage-icon-circle" style={{background: done ? 'var(--success)' : prog ? 'var(--warning)' : 'var(--surface-alt)', color: done||prog?'white':'var(--muted)'}}>
                  {done ? '✓' : prog ? '⏳' : s.icon}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
                    <span className="stage-name">{s.label}</span>
                    <span className="stage-team" style={{ color: ROLES[s.team].color, background: ROLES[s.team].bg }}>{s.team === 'admin' ? 'Sales' : s.team}</span>
                  </div>
                  <div className="stage-meta">
                    {done && 'Completed ' + formatDate(sd.completed_at)}
                    {prog && 'In progress'}
                    {!done && !prog && 'Not started'}
                  </div>
                </div>
                <span style={{color:'var(--muted)',fontSize:'14px'}}>{isExp ? '▾' : '›'}</span>
              </button>
              {isExp && (
                <div className="stage-editor">
                  <StageEditor stage={s} stageData={sd} college={college} canEdit={ce} onUpdate={(u) => updateStage(s.id, u)} onComplete={(d, m) => completeStage(s.id, d, m)} />
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ============ STAGE EDITOR ============
function StageEditor({ stage, stageData, college, canEdit, onUpdate, onComplete }) {
  const [form, setForm] = useState(stageData.data || {});
  const upd = (k, v) => setForm(p => ({ ...p, [k]: v }));
  useEffect(() => {
    setForm(stageData.data || {});
  }, [stage.id, stageData.data]);
  const keepTypingInsideEditor = (e) => e.stopPropagation();
  
  if (!canEdit && stageData.status !== 'completed') {
    return <div className="stage-editor-inner"><div style={{fontSize:'13px',color:'var(--muted)'}}>Managed by {ROLES[stage.team].label}. View-only.</div></div>;
  }
  
  const renderForm = () => {
    switch (stage.id) {
      case 'initial_meeting':
        return <>
          <Field label="Meeting Date" type="date" v={form.date} on={(v) => upd('date', v)} d={!canEdit} />
          <Field label="Attendees" v={form.attendees} on={(v) => upd('attendees', v)} ph="e.g., Principal, HOD-Maths" d={!canEdit} />
          <Field label="Notes" type="textarea" v={form.notes} on={(v) => upd('notes', v)} d={!canEdit} />
        </>;
      case 'product_demo':
        return <>
          <Field label="Demo Date" type="date" v={form.date} on={(v) => upd('date', v)} d={!canEdit} />
          <Field label="Attendees" v={form.attendees} on={(v) => upd('attendees', v)} ph="e.g., Principal, HOD-Maths, Faculty" d={!canEdit} />
          <Field label="Demo Outcome" type="textarea" v={form.outcome} on={(v) => upd('outcome', v)} ph="How did the demo go?" d={!canEdit} />
          <div style={{marginTop:'8px'}}>
            <div style={{fontSize:'12px',fontWeight:600,color:'var(--muted)',marginBottom:'6px'}}>Follow-up Done?</div>
            <div style={{display:'flex',gap:'8px'}}>
              {['yes','no'].map(opt => (
                <button key={opt} disabled={!canEdit} onClick={() => upd('followup_done', opt)}
                  style={{flex:1,padding:'9px',borderRadius:'8px',border:'2px solid',cursor:canEdit?'pointer':'default',fontSize:'13px',fontWeight:600,textTransform:'capitalize',
                    borderColor:form.followup_done===opt?(opt==='yes'?'#2D7A4F':'#DC2626'):'var(--border)',
                    background:form.followup_done===opt?(opt==='yes'?'#E8F3EC':'#FEF2F2'):'white',
                    color:form.followup_done===opt?(opt==='yes'?'#2D7A4F':'#DC2626'):'var(--muted)'}}>
                  {opt==='yes'?'✅ Yes':'❌ No'}
                </button>
              ))}
            </div>
          </div>
          {form.followup_done === 'yes' && (
            <div style={{marginTop:'8px',padding:'12px',background:'#E8F3EC',borderRadius:'8px',border:'1px solid #B7E4C7'}}>
              <Field label="Follow-up Comments" type="textarea" v={form.followup_comment} on={(v) => upd('followup_comment', v)} ph="What happened in the follow-up? Next steps discussed?" d={!canEdit} />
            </div>
          )}
          {form.followup_done === 'no' && (
            <div style={{marginTop:'8px',padding:'12px',background:'#FEF2F2',borderRadius:'8px',border:'1px solid #FECACA'}}>
              <Field label="Reason for No Follow-up *" type="textarea" v={form.followup_reason} on={(v) => upd('followup_reason', v)} ph="Why wasn't follow-up done? e.g., Management not available, Price issue, Lost interest..." d={!canEdit} />
            </div>
          )}
        </>;
      case 'demo_followup':
        return <>
          <Field label="Follow-up Date" type="date" v={form.date} on={(v) => upd('date', v)} d={!canEdit} />
          <Field label="Feedback" type="textarea" v={form.feedback} on={(v) => upd('feedback', v)} ph="What did the management say?" d={!canEdit} />
        </>;
      case 'pricing_negotiation':
        return <>
          <Field label="Price per Student (₹)" type="number" v={form.agreed_price} on={(v) => upd('agreed_price', v)} d={!canEdit} />
          <Field label="Total Students" type="number" v={form.total_students || college.total_students} on={(v) => upd('total_students', v)} d={!canEdit} />
          <Field label="Total Deal Value (₹)" type="number" v={form.total_value} on={(v) => upd('total_value', v)} d={!canEdit} />
          <Field label="Notes" type="textarea" v={form.notes} on={(v) => upd('notes', v)} d={!canEdit} />
        </>;
      case 'mou_signing':
        return <>
          <Field label="MOU Date" type="date" v={form.mou_date} on={(v) => upd('mou_date', v)} d={!canEdit} />
          <Field label="MOU Document Link" v={form.mou_link} on={(v) => upd('mou_link', v)} ph="Google Drive link" d={!canEdit} />
          <Field label="Notes" type="textarea" v={form.notes} on={(v) => upd('notes', v)} d={!canEdit} />
        </>;
      case 'syllabus_submission':
        return <SyllabusForm form={form} upd={upd} canEdit={canEdit} />;
      case 'coverage_check':
        return <CoverageForm form={form} upd={upd} canEdit={canEdit} college={college} />;
      case 'coverage_communication':
        return <>
          <Field label="Communicated on" type="date" v={form.communicated_at} on={(v) => upd('communicated_at', v)} d={!canEdit} />
          <Field label="Target Implementation Date" type="date" v={form.target_impl_date} on={(v) => upd('target_impl_date', v)} d={!canEdit} />
        </>;
      case 'student_data':
        return <>
          <div style={{padding:'10px 14px',background:'var(--warning-soft)',borderRadius:'8px',fontSize:'12px',color:'var(--warning)',marginBottom:'10px'}}>College sends student data via Excel. Log count and file link.</div>
          <Field label="Total Students Received" type="number" v={form.student_count} on={(v) => upd('student_count', v)} d={!canEdit} />
          <Field label="Student Data File Link" v={form.file_link} on={(v) => upd('file_link', v)} ph="Google Drive/Sheet link" d={!canEdit} />
          <Field label="Notes" type="textarea" v={form.notes} on={(v) => upd('notes', v)} ph="Missing data, quality issues?" d={!canEdit} />
        </>;
      case 'license_creation':
        return <>
          <Field label="Total Licenses Required" type="number" v={form.total_licenses || college.stages.student_data?.data?.student_count} on={(v) => upd('total_licenses', v)} d={!canEdit} />
          <Field label="Licenses Created" type="number" v={form.licenses_created} on={(v) => upd('licenses_created', v)} d={!canEdit} />
          <Field label="Notes" type="textarea" v={form.notes} on={(v) => upd('notes', v)} d={!canEdit} />
        </>;
      case 'impl_confirmation':
        return <>
          <Field label="Confirmed Date" type="date" v={form.confirmed_date} on={(v) => upd('confirmed_date', v)} d={!canEdit} />
          <Field label="Team Members" v={form.team_members} on={(v) => upd('team_members', v)} ph="e.g., Ravi, Priya" d={!canEdit} />
          <Field label="Notes" type="textarea" v={form.notes} on={(v) => upd('notes', v)} d={!canEdit} />
        </>;
      case 'implementation':
        return <>
          <Field label="Actual Implementation Date" type="date" v={form.actual_date} on={(v) => upd('actual_date', v)} d={!canEdit} />
          <Field label="Team" v={form.team_members} on={(v) => upd('team_members', v)} d={!canEdit} />
          <Field label="On-ground Notes" type="textarea" v={form.notes} on={(v) => upd('notes', v)} d={!canEdit} />
        </>;
      case 'impl_feedback':
        return <>
          <Field label="Quality" type="select" options={['Excellent','Good','Average','Issues Faced']} v={form.quality} on={(v) => upd('quality', v)} d={!canEdit} />
          <Field label="Issues" type="textarea" v={form.issues} on={(v) => upd('issues', v)} d={!canEdit} />
          <Field label="Detailed Feedback" type="textarea" v={form.feedback} on={(v) => upd('feedback', v)} d={!canEdit} />
        </>;
      case 'orientation': {
        const total = college.stages.student_data?.data?.student_count || college.total_students || 0;
        return <>
          <Field label="Start Date" type="date" v={form.start_date} on={(v) => upd('start_date', v)} d={!canEdit} />
          <Field label="Students Onboarded" type="number" v={form.students_onboarded} on={(v) => upd('students_onboarded', v)} ph={'Out of ' + total} d={!canEdit} />
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
            <Field label="Credentials via Email" type="number" v={form.credentials_sent_email} on={(v) => upd('credentials_sent_email', v)} d={!canEdit} />
            <Field label="Credentials via WhatsApp" type="number" v={form.credentials_sent_whatsapp} on={(v) => upd('credentials_sent_whatsapp', v)} d={!canEdit} />
          </div>
          <Field label="Notes" type="textarea" v={form.notes} on={(v) => upd('notes', v)} d={!canEdit} />
        </>;
      }
      default: return null;
    }
  };
  
  const msgs = {
    syllabus_submission: 'Syllabus uploaded — assigned to Content Team',
    coverage_check: 'Coverage check completed by Content Team',
    student_data: 'Student data received — assigned to Implementation Team',
    license_creation: 'Licenses created',
    impl_confirmation: 'Implementation date confirmed',
    implementation: 'Implementation executed',
    impl_feedback: 'Implementation feedback submitted — assigned to Engagement Team',
    orientation: 'Students onboarded. Sales cycle complete!',
  };
  
  return (
    <div className="stage-editor-inner" onClick={keepTypingInsideEditor} onMouseDown={keepTypingInsideEditor} onKeyDown={keepTypingInsideEditor}>
      <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
        {renderForm()}
      </div>
      {canEdit && stageData.status !== 'completed' && (
        <div style={{display:'flex',gap:'8px',marginTop:'18px',flexWrap:'wrap'}}>
          {stageData.status === 'not_started' && (
            <button className="btn-secondary" onClick={() => onUpdate({ status: 'in_progress', data: form })}>Mark In Progress</button>
          )}
          <button className="btn-primary" onClick={() => onComplete(form, msgs[stage.id])}>Mark Completed</button>
          <button className="btn-secondary" onClick={() => onUpdate({ data: form })}>Save Draft</button>
        </div>
      )}
      {stageData.status === 'completed' && (
        <div style={{marginTop:'14px',padding:'10px 14px',background:'var(--success-soft)',borderRadius:'8px',fontSize:'13px',color:'var(--success)'}}>
          ✓ Completed on {formatDate(stageData.completed_at)}
        </div>
      )}
    </div>
  );
}

function Field({ label, type, v, on, ph, options, d }) {
  const stop = (e) => e.stopPropagation();
  return (
    <div>
      <label className="label">{label}</label>
      {type === 'textarea' ? <textarea className="input" rows="3" value={v||''} onClick={stop} onMouseDown={stop} onKeyDown={stop} onChange={e => on(e.target.value)} placeholder={ph} disabled={d} style={{resize:'vertical'}} /> :
       type === 'select' ? <select className="input" value={v||''} onChange={e => on(e.target.value)} disabled={d}><option value="">Select…</option>{options.map(o => <option key={o}>{o}</option>)}</select> :
       <input className="input" type={type||'text'} value={v||''} onChange={e => on(e.target.value)} placeholder={ph} disabled={d} />}
    </div>
  );
}

function SyllabusForm({ form, upd, canEdit }) {
  const units = form.units || [];
  const addU = () => upd('units', [...units, { name: 'Unit ' + (units.length + 1), topics: '' }]);
  const updU = (i, k, v) => upd('units', units.map((u, j) => j === i ? { ...u, [k]: v } : u));
  const rmU = (i) => upd('units', units.filter((_, j) => j !== i));
  return <>
    <Field label="Subject" v={form.subject} on={(v) => upd('subject', v)} ph="e.g., Engineering Mathematics I" d={!canEdit} />
    <Field label="Semester / Year" v={form.semester} on={(v) => upd('semester', v)} ph="e.g., Sem 1" d={!canEdit} />
    <div>
      <label className="label">Syllabus Units</label>
      {units.map((u, i) => (
        <div key={i} style={{display:'flex',gap:'6px',marginBottom:'6px'}}>
          <input className="input" value={u.name} onChange={e => updU(i, 'name', e.target.value)} placeholder="Unit name" disabled={!canEdit} style={{flex:1}} />
          <input className="input" value={u.topics} onChange={e => updU(i, 'topics', e.target.value)} placeholder="Topics covered" disabled={!canEdit} style={{flex:2}} />
          {canEdit && <button className="btn-secondary" onClick={() => rmU(i)} style={{padding:'8px 12px'}}>×</button>}
        </div>
      ))}
      {canEdit && <button className="btn-secondary" onClick={addU} style={{marginTop:'4px'}}>+ Add Unit</button>}
    </div>
    <Field label="Notes for Content Team" type="textarea" v={form.notes_for_content} on={(v) => upd('notes_for_content', v)} d={!canEdit} />
  </>;
}

function CoverageForm({ form, upd, canEdit, college }) {
  const units = college.stages.syllabus_submission?.data?.units || [];
  const cov = form.unit_coverage || units.map(u => ({ unit: u.name, pct: 0, notes: '' }));
  const updC = (i, k, v) => {
    const nc = cov.map((c, j) => j === i ? { ...c, [k]: v } : c);
    upd('unit_coverage', nc);
    if (k === 'pct') {
      const t = Math.round(nc.reduce((s, c) => s + (parseFloat(c.pct) || 0), 0) / nc.length);
      upd('total_coverage', t);
    }
  };
  
  return <>
    <div style={{padding:'10px 14px',background:'var(--info-soft)',borderRadius:'8px',fontSize:'12px',color:'var(--info)',marginBottom:'4px'}}>
      Review the syllabus and update coverage % per unit based on Promath's content library.
    </div>
    {units.length === 0 ? <div style={{padding:'14px',background:'var(--surface-alt)',borderRadius:'8px',fontSize:'12px',color:'var(--muted)',textAlign:'center'}}>No syllabus uploaded yet.</div> :
      <div>
        <label className="label">Unit Coverage</label>
        {units.map((u, i) => {
          const c = cov[i] || { pct: 0, notes: '' };
          return (
            <div key={i} style={{padding:'10px',background:'var(--surface-alt)',borderRadius:'8px',marginBottom:'6px'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:'6px',gap:'10px'}}>
                <div style={{minWidth:0,flex:1}}>
                  <div style={{fontSize:'13px',fontWeight:500}}>{u.name}</div>
                  <div style={{fontSize:'11px',color:'var(--muted)'}}>{u.topics}</div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:'5px'}}>
                  <input type="number" min="0" max="100" className="input" style={{width:'70px',padding:'6px 10px'}} value={c.pct} onChange={e => updC(i, 'pct', e.target.value)} disabled={!canEdit} />
                  <span style={{fontSize:'13px',color:'var(--muted)'}}>%</span>
                </div>
              </div>
              <input className="input" placeholder="Notes (missing topics, alternatives...)" value={c.notes||''} onChange={e => updC(i, 'notes', e.target.value)} disabled={!canEdit} style={{fontSize:'12px',padding:'7px 10px'}} />
            </div>
          );
        })}
      </div>
    }
    <div style={{padding:'12px 14px',background:'var(--success-soft)',borderRadius:'8px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div style={{fontSize:'13px',fontWeight:500}}>Total Coverage</div>
      <div className="serif" style={{fontSize:'26px',fontWeight:500,color:'var(--success)'}}>{form.total_coverage || 0}%</div>
    </div>
    <Field label="Overall Notes for Admin" type="textarea" v={form.notes} on={(v) => upd('notes', v)} d={!canEdit} />
  </>;
}

// ============ BULK COLLEGE UPLOAD ============
function BulkUploadModal({ onClose, onImport }) {
  const [rows, setRows] = useState([]);
  const [error, setError] = useState('');
  const [fileName, setFileName] = useState('');

  const normalizeKey = (key) => String(key || '').toLowerCase().replace(/[^a-z0-9]/g, '');
  const pick = (row, keys) => {
    const map = {};
    Object.keys(row || {}).forEach(k => { map[normalizeKey(k)] = row[k]; });
    for (const key of keys) {
      const value = map[normalizeKey(key)];
      if (value !== undefined && value !== null && String(value).trim() !== '') return String(value).trim();
    }
    return '';
  };

  const mapRow = (row) => ({
    name: pick(row, ['college name', 'college', 'name', 'institution name', 'institution']),
    college_type: pick(row, ['college type', 'type']),
    academic_year: pick(row, ['academic year', 'year']),
    contact_name: pick(row, ['contact person', 'contact name', 'contact', 'principal', 'hod']),
    contact_designation: pick(row, ['designation', 'contact designation', 'role']),
    phone: pick(row, ['phone', 'mobile', 'contact number', 'number']),
    email: pick(row, ['email', 'mail']),
    location: pick(row, ['location', 'city', 'place', 'district']),
    total_students: pick(row, ['students', 'total students', 'student count', 'strength']),
    current_status: pick(row, ['current status', 'status', 'remarks']),
    additional_comments: pick(row, ['additional comments', 'comments', 'notes']),
  });

  const parseFile = (file) => {
    setError('');
    setRows([]);
    setFileName(file.name);
    if (!window.XLSX) {
      setError('Excel parser not loaded. Check internet connection and refresh.');
      return;
    }
    const reader = new FileReader();
    reader.onerror = () => setError('Unable to read file.');
    reader.onload = (e) => {
      try {
        const wb = window.XLSX.read(e.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const raw = window.XLSX.utils.sheet_to_json(ws, { defval: '' });
        const parsed = raw.map(mapRow).filter(r => r.name);
        if (parsed.length === 0) {
          setError('No valid colleges found. First sheet must have a College Name or Name column.');
          return;
        }
        setRows(parsed);
      } catch (err) {
        setError('File parse failed. Upload .xlsx, .xls, or .csv file.');
      }
    };
    reader.readAsArrayBuffer(file);
  };

  const downloadTemplate = () => {
    const csv = [
      'College Name,Contact Person,Designation,Phone,Email,Location,Students,Current Status,Additional Comments',
      'Example Engineering College,Dr ABC,Principal,9876543210,principal@example.edu,Chennai,500,Need follow-up,Imported from bulk upload'
    ].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'promath_college_bulk_upload_template.csv';
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div className="modal-bg">
      <div className="modal" style={{maxWidth:'760px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'18px',gap:'14px'}}>
          <div>
            <h2>Bulk Upload Colleges</h2>
            <div style={{fontSize:'12px',color:'var(--muted)'}}>Upload Excel or CSV. Duplicate college names will be skipped.</div>
          </div>
          <button onClick={onClose} className="btn-secondary" style={{padding:'4px 10px'}}>×</button>
        </div>

        <div style={{display:'grid',gap:'12px'}}>
          <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
            <label className="btn-primary" style={{display:'inline-flex',alignItems:'center',gap:'8px'}}>
              Upload Excel / CSV
              <input type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={e => e.target.files?.[0] && parseFile(e.target.files[0])} />
            </label>
            <button className="btn-secondary" onClick={downloadTemplate}>Download Template</button>
          </div>

          {fileName && <div style={{fontSize:'12px',color:'var(--muted)'}}>Selected file: {fileName}</div>}
          {error && <div style={{padding:'10px 12px',borderRadius:'8px',background:'var(--danger-soft)',color:'var(--danger)',fontSize:'13px'}}>{error}</div>}

          {rows.length > 0 && (
            <div style={{border:'1px solid var(--border)',borderRadius:'12px',overflow:'hidden'}}>
              <div style={{padding:'10px 12px',background:'var(--success-soft)',color:'var(--success)',fontSize:'13px',fontWeight:700}}>
                {rows.length} colleges ready to import
              </div>
              <div style={{maxHeight:'280px',overflow:'auto'}}>
                <table>
                  <thead><tr><th>College</th><th>Contact</th><th>Location</th><th>Students</th></tr></thead>
                  <tbody>
                    {rows.slice(0, 50).map((r, i) => (
                      <tr key={i}>
                        <td>{r.name}</td>
                        <td>{r.contact_name || '—'}</td>
                        <td>{r.location || '—'}</td>
                        <td>{r.total_students || '—'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {rows.length > 50 && <div style={{padding:'8px 12px',fontSize:'12px',color:'var(--muted)'}}>Showing first 50 rows only.</div>}
            </div>
          )}
        </div>

        <div style={{display:'flex',gap:'8px',marginTop:'22px',justifyContent:'flex-end'}}>
          <button className="btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn-primary" onClick={() => onImport(rows)} disabled={rows.length === 0} style={{opacity:rows.length?1:.55}}>
            Import {rows.length || ''} Colleges
          </button>
        </div>
      </div>
    </div>
  );
}

// ============ ADD MODAL ============
function AddModal({ onClose, onAdd }) {
  const [f, setF] = useState({ name: '', college_type: '', academic_year: '', contact_name: '', contact_designation: '', phone: '', email: '', location: '', total_students: '' });
  const submit = () => {
    if (!f.name.trim()) { alert('College name is required'); return; }
    onAdd(f);
  };
  return (
    <div className="modal-bg">
      <div className="modal">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'20px'}}>
          <div>
            <h2>Add New College</h2>
            <div style={{fontSize:'12px',color:'var(--muted)'}}>Start tracking a new sales pipeline</div>
          </div>
          <button onClick={onClose} className="btn-secondary" style={{padding:'4px 10px'}}>×</button>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
          <Field label="College Name *" v={f.name} on={(v) => setF({...f, name: v})} ph="e.g., Anna University" />
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
            <div>
              <div style={{fontSize:'12px',fontWeight:600,color:'var(--muted)',marginBottom:'4px'}}>College Type</div>
              <select value={f.college_type} onChange={(e) => setF({...f, college_type: e.target.value})}
                style={{width:'100%',padding:'9px 12px',borderRadius:'8px',border:'1px solid var(--border)',fontSize:'13px',background:'white',color:'var(--ink)',outline:'none'}}>
                <option value="">— Select type —</option>
                <option value="autonomous">Autonomous</option>
                <option value="affiliated">Affiliated</option>
                <option value="private">Private</option>
                <option value="deemed">Deemed</option>
              </select>
            </div>
            <div>
              <div style={{fontSize:'12px',fontWeight:600,color:'var(--muted)',marginBottom:'4px'}}>Academic Year</div>
              <select value={f.academic_year} onChange={(e) => setF({...f, academic_year: e.target.value})}
                style={{width:'100%',padding:'9px 12px',borderRadius:'8px',border:'1px solid var(--border)',fontSize:'13px',background:'white',color:'var(--ink)',outline:'none'}}>
                <option value="">— Select year —</option>
                <option value="2024-2025">2024 – 2025</option>
                <option value="2025-2026">2025 – 2026</option>
                <option value="2026-2027">2026 – 2027</option>
                <option value="2027-2028">2027 – 2028</option>
              </select>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
            <Field label="Contact Person" v={f.contact_name} on={(v) => setF({...f, contact_name: v})} ph="Dr. ABC" />
            <Field label="Designation" v={f.contact_designation} on={(v) => setF({...f, contact_designation: v})} ph="Principal / HOD" />
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
            <Field label="Phone" v={f.phone} on={(v) => setF({...f, phone: v})} ph="+91 ..." />
            <Field label="Email" v={f.email} on={(v) => setF({...f, email: v})} ph="contact@..." />
          </div>
          <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:'10px'}}>
            <Field label="Location" v={f.location} on={(v) => setF({...f, location: v})} ph="City" />
            <Field label="Students" type="number" v={f.total_students} on={(v) => setF({...f, total_students: v})} ph="500" />
          </div>
        </div>
        <div style={{display:'flex',gap:'8px',marginTop:'24px',justifyContent:'flex-end'}}>
          <button className="btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn-primary" onClick={submit}>Add College</button>
        </div>
      </div>
    </div>
  );
}
