                  {v:'partial',l:'⚠️ Partial — needs follow-up'},
                  {v:'called', l:'📞 Called back'},
                  {v:'skip',   l:'⏭ Skipped — not applicable'},
                ];
                const toggleProgress=(stepId,val)=>updateCollege(c.id,col=>({...col,automation_journey_progress:{...(col.automation_journey_progress||{}),[stepId]:val}}));

                return (
                  <div key={c.id} className="card" style={{padding:'0',overflow:'hidden'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'14px',padding:'16px 20px',cursor:'pointer'}} onClick={()=>setExpandedId(isExpanded?null:c.id)}>
                      <div style={{width:'40px',height:'40px',borderRadius:'10px',background:'#EBF0FA',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px',flexShrink:0}}>🎯</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:600,color:'var(--ink)',fontSize:'14px'}}>{c.name}</div>
                        <div style={{fontSize:'11px',color:'var(--muted)',marginTop:'2px'}}>{c.location} · {c.total_students||'?'} students · {c.contact_name}</div>
                        {!journey && <div style={{marginTop:'4px',fontSize:'11px',color:'#B8410A',fontWeight:500}}>⚠️ No journey built yet — go to Journey Builder tab</div>}
                        {journey && nextStep && (
                          <div style={{marginTop:'5px',display:'inline-flex',alignItems:'center',gap:'5px',background:'#FFF7ED',border:'1px solid #FED7AA',borderRadius:'6px',padding:'2px 8px'}}>
                            <span style={{fontSize:'11px'}}>{(CHANNEL_OPTIONS.find(ch=>ch.id===nextStep.channel)||CHANNEL_OPTIONS[0]).icon}</span>
                            <span style={{fontSize:'11px',color:'#B8410A',fontWeight:500}}>Next: {nextStep.message?nextStep.message.slice(0,50)+'…':nextStep.channel+' · Day '+nextStep.delay}</span>
                          </div>
                        )}
                        {(() => { const d = daysSince(getLastAction(c)); return d !== null ? (
                          <span style={{marginLeft:'6px',fontSize:'10px',color:d>14?'#DC2626':d>7?'#B8410A':'#2D7A4F',fontWeight:500}}>
                            {d===0?'· Updated today':d>14?`· ⚠️ No action for ${d} days`:`· Last action ${d}d ago`}
                          </span>
                        ):null;})()}
                      </div>
                      <div style={{textAlign:'right',flexShrink:0}}>
                        {journey && <div style={{fontSize:'12px',fontWeight:600,color:'var(--ink)',marginBottom:'3px'}}>{journey.name}</div>}
                        <div style={{fontSize:'11px',color:'var(--muted)'}}>{doneSteps.length}/{jSteps.length} steps · {pct}%</div>
                        {journey?.start_date && <div style={{fontSize:'10px',color:'var(--muted)',marginTop:'2px'}}>Started {journey.start_date}</div>}
                      </div>
                      <div style={{color:'var(--muted)',fontSize:'18px',marginLeft:'8px'}}>{isExpanded?'▲':'▼'}</div>
                    </div>

                    <div style={{height:'3px',background:'var(--border)',margin:'0 20px'}}>
                      <div style={{height:'3px',background:'var(--accent)',width:pct+'%',borderRadius:'2px',transition:'width 0.3s'}}></div>
                    </div>

                    {isExpanded && (
                      <div style={{padding:'16px 20px',borderTop:'1px solid var(--border)',background:'var(--surface)'}}>
                        {!journey ? (
                          <div style={{textAlign:'center',padding:'20px'}}>
                            <div style={{fontSize:'13px',color:'var(--muted)',marginBottom:'10px'}}>No journey configured for this college yet.</div>
                            <button onClick={()=>setTab('journey')} style={{padding:'8px 18px',borderRadius:'8px',border:'none',background:'var(--accent)',color:'white',fontSize:'12px',fontWeight:600,cursor:'pointer'}}>Go to Journey Builder →</button>
                          </div>
                        ):(
                          <>
                            <div style={{fontSize:'13px',fontWeight:600,color:'var(--ink)',marginBottom:'12px'}}>Steps — {journey.name}</div>
                            <div style={{display:'grid',gap:'8px'}}>
                              {jSteps.map((step,idx)=>{
                                const prog = (c.automation_journey_progress||{})[step.id];
                                const isDone = !!prog;
                                const ch = CHANNEL_OPTIONS.find(x=>x.id===step.channel)||CHANNEL_OPTIONS[0];
                                const delayLabel = step.delay===0?'Day 0 (same day)':'Day '+step.delay;
                                return(
                                  <div key={step.id} style={{padding:'10px 12px',borderRadius:'8px',background:isDone?'#F0FAF4':'white',border:'1px solid',borderColor:isDone?'#B7E4C7':'var(--border)'}}>
                                    <label style={{display:'flex',alignItems:'center',gap:'10px',cursor:'pointer'}}>
                                      <input type="checkbox" checked={isDone} onChange={()=>toggleProgress(step.id, isDone?false:{done:true,date:new Date().toISOString().slice(0,10)})} style={{width:'16px',height:'16px',accentColor:'#2D7A4F',cursor:'pointer',flexShrink:0}} />
                                      <span style={{fontSize:'12px',padding:'2px 7px',borderRadius:'5px',background:ch.color+'18',color:ch.color,fontWeight:600,flexShrink:0}}>{ch.icon} {ch.label}</span>
                                      <span style={{fontSize:'11px',color:'var(--muted)',flexShrink:0}}>{delayLabel}</span>
                                      <span style={{fontSize:'12px',color:isDone?'#2D7A4F':'var(--ink)',textDecoration:isDone?'line-through':'none',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{step.message||'No message set'}</span>
                                      {isDone&&<span style={{fontSize:'10px',color:'#2D7A4F',fontWeight:600,flexShrink:0}}>✓ {prog.date||''}</span>}
                                    </label>
                                    {isDone&&(
                                      <div style={{marginTop:'8px',paddingLeft:'26px',display:'grid',gap:'6px'}}>
                                        <select value={(prog&&prog.outcome)||''} onChange={e=>toggleProgress(step.id,{...prog,outcome:e.target.value})}
                                          style={{padding:'5px 8px',borderRadius:'6px',border:'1px solid var(--border)',fontSize:'11px',background:'white',color:'var(--ink)',width:'100%',cursor:'pointer'}}>
                                          {OUTCOMES.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
                                        </select>
                                        {prog&&prog.outcome&&(
                                          <input placeholder="Add a note..." value={(prog&&prog.note)||''} onChange={e=>toggleProgress(step.id,{...prog,note:e.target.value})}
                                            style={{width:'100%',padding:'5px 8px',borderRadius:'6px',border:'1px solid var(--border)',fontSize:'11px',background:'white',color:'var(--ink)',boxSizing:'border-box'}} />
                                        )}
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                          </>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* PIPELINE TAB */}
      {tab === 'pipeline' && (
        <div style={{overflowX:'auto'}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,minmax(220px,1fr))',gap:'14px'}}>
            {[
              {id:'no_journey',  label:'No Journey Yet',   icon:'⚙️', color:'#6B7280', bg:'#F3F4F6'},
              {id:'in_progress', label:'In Progress',      icon:'🔄', color:'#3B5AA3', bg:'#EBF0FA'},
              {id:'completed',   label:'Completed',        icon:'✅', color:'#2D7A4F', bg:'#E8F3EC'},
            ].map(col=>{
              const cols = engColleges.filter(c=>{
                const j=c.automation_journey;
                if(!j) return col.id==='no_journey';
                const steps=(j.steps||[]).filter(s=>s.enabled!==false);
                const done=steps.filter(s=>!!((c.automation_journey_progress||{})[s.id])).length;
                if(col.id==='completed') return steps.length>0&&done===steps.length;
                if(col.id==='in_progress') return done>0&&done<steps.length;
                return false;
              });
              return(
                <div key={col.id} style={{background:'var(--surface)',borderRadius:'12px',padding:'14px'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}}>
                    <div style={{fontSize:'12px',fontWeight:700,color:col.color,textTransform:'uppercase',letterSpacing:'0.5px'}}>{col.icon} {col.label}</div>
                    <div style={{background:col.bg,color:col.color,borderRadius:'20px',padding:'2px 8px',fontSize:'11px',fontWeight:700}}>{cols.length}</div>
                  </div>
                  {cols.length===0?<div style={{fontSize:'12px',color:'var(--muted)',textAlign:'center',padding:'16px 0'}}>Empty</div>:
                    cols.map(c=>{
                      const j=c.automation_journey;
                      const steps=j?(j.steps||[]).filter(s=>s.enabled!==false):[];
                      const done=steps.filter(s=>!!((c.automation_journey_progress||{})[s.id])).length;
                      const pct=steps.length?Math.round(done/steps.length*100):0;
                      return(
                        <div key={c.id} style={{background:'white',borderRadius:'8px',padding:'10px',marginBottom:'8px',border:'1px solid var(--border)',cursor:'pointer'}} onClick={()=>{setTab('overview');setExpandedId(c.id);}}>
                          <div style={{fontSize:'12px',fontWeight:600,color:'var(--ink)',marginBottom:'2px'}}>{c.name}</div>
                          <div style={{fontSize:'10px',color:'var(--muted)',marginBottom:'2px'}}>{c.location}</div>
                          {j&&<div style={{fontSize:'10px',color:'var(--muted)',marginBottom:'6px',fontStyle:'italic'}}>{j.name}</div>}
                          {steps.length>0&&<>
                            <div style={{height:'3px',background:'var(--border)',borderRadius:'2px'}}>
                              <div style={{height:'3px',background:col.color,width:pct+'%',borderRadius:'2px'}}></div>
                            </div>
                            <div style={{fontSize:'10px',color:'var(--muted)',marginTop:'3px'}}>{done}/{steps.length} steps · {pct}%</div>
                          </>}
                        </div>
                      );
                    })
                  }
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ACTION QUEUE TAB */}
      {tab === 'actions' && (
        <div className="card">
          <div style={{marginBottom:'16px'}}>
            <div className="serif" style={{fontSize:'19px',fontWeight:500}}>Today's Action Queue</div>
            <div style={{fontSize:'12px',color:'var(--muted)',marginTop:'2px'}}>Next pending step from each college's journey</div>
          </div>
          {(() => {
            const items = engColleges.map(c => {
              const j = c.automation_journey;
              if (!j) return null;
              const steps = (j.steps||[]).filter(s=>s.enabled!==false);
              const nextStep = steps.find(s=>!((c.automation_journey_progress||{})[s.id]));
              if (!nextStep) return null;
              const ch = CHANNEL_OPTIONS.find(x=>x.id===nextStep.channel)||CHANNEL_OPTIONS[0];
              return { c, j, nextStep, ch };
            }).filter(Boolean);
            if (items.length === 0) return (
              <div className="empty-state">
                <div className="empty-state-icon">{engColleges.length===0?'📦':'🎉'}</div>
                {engColleges.length===0?'No colleges in engagement yet.':'All steps completed across all colleges!'}
              </div>
            );
            return (
              <div style={{display:'grid',gap:'10px'}}>
                {items.map(({c,j,nextStep,ch})=>(
                  <div key={c.id} style={{display:'flex',alignItems:'center',gap:'14px',padding:'12px 16px',background:'var(--surface)',borderRadius:'10px',border:'1px solid var(--border)'}}>
                    <div style={{width:'36px',height:'36px',borderRadius:'9px',background:ch.color+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px',flexShrink:0}}>{ch.icon}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:'13px',fontWeight:600,color:'var(--ink)'}}>{c.name}</div>
                      <div style={{display:'flex',alignItems:'center',gap:'6px',marginTop:'3px',flexWrap:'wrap'}}>
                        <span style={{fontSize:'11px',padding:'2px 7px',borderRadius:'5px',background:ch.color+'18',color:ch.color,fontWeight:600}}>{ch.icon} {ch.label}</span>
                        <span style={{fontSize:'11px',color:'var(--muted)'}}>Day {nextStep.delay}</span>
                        <span style={{fontSize:'11px',color:'var(--ink)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'300px'}}>{nextStep.message?nextStep.message.slice(0,60)+'…':'No message set'}</span>
                      </div>
                      <div style={{fontSize:'10px',color:'var(--muted)',marginTop:'2px',fontStyle:'italic'}}>{j.name}</div>
                    </div>
                    <button onClick={()=>updateCollege(c.id,col=>({...col,automation_journey_progress:{...(col.automation_journey_progress||{}),[nextStep.id]:{done:true,date:new Date().toISOString().slice(0,10)}}}))}
                      style={{padding:'6px 14px',borderRadius:'7px',border:'none',background:'var(--accent)',color:'white',fontSize:'12px',fontWeight:600,cursor:'pointer',flexShrink:0}}>
                      Mark Done ✓
                    </button>
                  </div>
                ))}
              </div>
            );
          })()}
        </div>
      )}
      {/* JOURNEY BUILDER TAB */}
      {tab === 'journey' && <JourneyBuilder data={data} updateCollege={updateCollege} />}

      {/* USAGE DATA TAB */}
      {tab === 'usage' && <UsageTracker data={data} updateCollege={updateCollege} />}

    </div>
  );
}


// ============ USAGE DATA TRACKER ============
function UsageTracker({data, updateCollege}) {
  const [selId, setSelId] = React.useState('');
  const [selCourse, setSelCourse] = React.useState('');
  const [showAddCourse, setShowAddCourse] = React.useState(false);
  const [showAddEntry, setShowAddEntry] = React.useState(false);
  const [newCourse, setNewCourse] = React.useState({name:'', enrolled:''});
  const [newEntry, setNewEntry] = React.useState({date:'', users_using:'', total_hours:'', event:''});

  const col = data.colleges.find(c => c.id === selId);
  const courses = (col && col.usage_courses) || [];
  const activeCourse = courses.find(c => c.id === selCourse);
  const entries = activeCourse ? (activeCourse.entries || []) : [];

  const addCourse = () => {
    if (!newCourse.name.trim() || !newCourse.enrolled) return;
    const courseObj = {
      id: 'course_' + Date.now(),
      name: newCourse.name.trim(),
      enrolled: parseInt(newCourse.enrolled) || 0,
      entries: []
    };
    updateCollege(selId, c => ({
      ...c,
      usage_courses: [...(c.usage_courses || []), courseObj]
    }));
    setSelCourse(courseObj.id);
    setNewCourse({name:'', enrolled:''});
    setShowAddCourse(false);
  };

  const addEntry = () => {
    if (!newEntry.date || !newEntry.users_using || !newEntry.total_hours) return;
    const entry = {
      id: 'entry_' + Date.now(),
      date: newEntry.date,
      users_using: parseInt(newEntry.users_using) || 0,
      total_hours: parseFloat(newEntry.total_hours) || 0,
      event: newEntry.event.trim()
    };
    updateCollege(selId, c => ({
      ...c,
      usage_courses: (c.usage_courses || []).map(cr =>
        cr.id === selCourse ? { ...cr, entries: [...(cr.entries || []), entry].sort((a,b) => a.date.localeCompare(b.date)) } : cr
      )
    }));
    setNewEntry({date:'', users_using:'', total_hours:'', event:''});
    setShowAddEntry(false);
  };

  const deleteEntry = (entryId) => {
    updateCollege(selId, c => ({
      ...c,
      usage_courses: (c.usage_courses || []).map(cr =>
        cr.id === selCourse ? { ...cr, entries: (cr.entries || []).filter(e => e.id !== entryId) } : cr
      )
    }));
  };

  const deleteCourse = (courseId) => {
    if (!confirm('Delete this course and all its data?')) return;
    updateCollege(selId, c => ({
      ...c,
      usage_courses: (c.usage_courses || []).filter(cr => cr.id !== courseId)
    }));
    if (selCourse === courseId) setSelCourse('');
  };

  const downloadCSV = () => {
    if (!activeCourse || !entries.length) return;
    const enrolled = activeCourse.enrolled;
    let csv = activeCourse.name + ',' + entries.map(e => e.date).join(',') + '\n';
    csv += 'Total Number of users ,' + entries.map(() => enrolled).join(',') + '\n';
    csv += 'No of users using currently ,' + entries.map(e => e.users_using).join(',') + '\n';
    csv += 'No of total hours ,' + entries.map(e => e.total_hours.toFixed(2)).join(',') + '\n';
    csv += 'NO OF % USERS ,' + entries.map(e => ((e.users_using / enrolled) * 100).toFixed(2) + '%').join(',') + '\n';
    csv += 'AVERAGE USAGE BY ONE USER (MINS),' + entries.map(e => e.users_using > 0 ? Math.round((e.total_hours * 60) / e.users_using) : 0).join(',') + '\n';
    csv += ',' + entries.map(e => e.event || '').join(',') + '\n';
    const blob = new Blob([csv], {type: 'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (col.name + '_' + activeCourse.name + '_usage_data.csv').replace(/[^a-zA-Z0-9_.-]/g, '_');
    a.click();
    URL.revokeObjectURL(url);
  };

  const inp = {width:'100%',padding:'7px 10px',borderRadius:'7px',border:'1px solid var(--border)',fontSize:'12px',background:'white',color:'var(--ink)',outline:'none',boxSizing:'border-box'};
  const lbl = {fontSize:'11px',fontWeight:600,color:'var(--muted)',marginBottom:'4px',display:'block'};

  return (
    <div style={{display:'grid',gridTemplateColumns:'260px 1fr',gap:'20px',alignItems:'start'}}>

      {/* LEFT — College + Course Selector */}
      <div style={{display:'grid',gap:'14px'}}>
        <div className="card">
          <div className="serif" style={{fontSize:'16px',fontWeight:600,marginBottom:'14px'}}>Select College</div>
          <div style={{display:'grid',gap:'8px',maxHeight:'260px',overflowY:'auto'}}>
            {data.colleges.map(c => {
              const cCount = (c.usage_courses || []).length;
              return (
                <button key={c.id} onClick={() => {setSelId(c.id);setSelCourse('');}}
                  style={{textAlign:'left',padding:'10px 12px',borderRadius:'9px',border:'2px solid',cursor:'pointer',
                    borderColor:selId===c.id?'var(--accent)':'var(--border)',background:selId===c.id?'#EBF4FF':'white'}}>
                  <div style={{fontSize:'12px',fontWeight:600,color:'var(--ink)'}}>{c.name}</div>
                  <div style={{fontSize:'10px',color:'var(--muted)',marginTop:'2px'}}>{c.location} · {cCount} course{cCount!==1?'s':''}</div>
                </button>
              );
            })}
          </div>
        </div>

        {selId && (
          <div className="card">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'10px'}}>
              <div className="serif" style={{fontSize:'14px',fontWeight:600}}>Courses</div>
              <button onClick={() => setShowAddCourse(true)}
                style={{padding:'4px 10px',borderRadius:'6px',border:'none',background:'var(--accent)',color:'white',fontSize:'11px',fontWeight:600,cursor:'pointer'}}>+ Add</button>
            </div>
            {courses.length === 0 ? (
              <div style={{fontSize:'12px',color:'var(--muted)',textAlign:'center',padding:'16px 0'}}>No courses added yet</div>
            ) : (
              <div style={{display:'grid',gap:'6px'}}>
                {courses.map(cr => (
                  <div key={cr.id} style={{display:'flex',alignItems:'center',gap:'6px'}}>
                    <button onClick={() => setSelCourse(cr.id)}
                      style={{flex:1,textAlign:'left',padding:'8px 10px',borderRadius:'7px',border:'2px solid',cursor:'pointer',fontSize:'11px',
                        borderColor:selCourse===cr.id?'var(--accent)':'var(--border)',background:selCourse===cr.id?'#EBF4FF':'white'}}>
                      <div style={{fontWeight:600,color:'var(--ink)'}}>{cr.name}</div>
                      <div style={{color:'var(--muted)',marginTop:'2px'}}>Enrolled: {cr.enrolled} · {(cr.entries||[]).length} updates</div>
                    </button>
                    <button onClick={() => deleteCourse(cr.id)}
                      style={{padding:'4px 7px',borderRadius:'5px',border:'1px solid #FECACA',background:'#FEF2F2',color:'#DC2626',fontSize:'10px',cursor:'pointer',flexShrink:0}}>✕</button>
                  </div>
                ))}
              </div>
            )}

            {/* Add Course Form */}
            {showAddCourse && (
              <div style={{marginTop:'10px',padding:'12px',background:'var(--surface)',borderRadius:'8px',border:'1px solid var(--border)'}}>
                <div style={{fontSize:'12px',fontWeight:600,color:'var(--ink)',marginBottom:'8px'}}>Add New Course</div>
                <div style={{display:'grid',gap:'8px'}}>
                  <div><label style={lbl}>Course Name</label><input style={inp} placeholder="e.g. Calculus For Engineers (MA2122)" value={newCourse.name} onChange={e=>setNewCourse({...newCourse,name:e.target.value})} /></div>
                  <div><label style={lbl}>Total Enrolled Students</label><input type="number" style={inp} placeholder="e.g. 1413" value={newCourse.enrolled} onChange={e=>setNewCourse({...newCourse,enrolled:e.target.value})} /></div>
                  <div style={{display:'flex',gap:'6px'}}>
                    <button onClick={addCourse} style={{flex:1,padding:'7px',borderRadius:'7px',border:'none',background:'var(--accent)',color:'white',fontSize:'12px',fontWeight:600,cursor:'pointer'}}>Add Course</button>
                    <button onClick={()=>{setShowAddCourse(false);setNewCourse({name:'',enrolled:''});}} style={{padding:'7px 12px',borderRadius:'7px',border:'1px solid var(--border)',background:'white',fontSize:'12px',cursor:'pointer',color:'var(--muted)'}}>Cancel</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* RIGHT — Usage Data Table */}
      {!selId ? (
        <div className="card" style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'400px'}}>
          <div className="empty-state"><div className="empty-state-icon">📈</div>Select a college to track usage data</div>
        </div>
      ) : !selCourse ? (
        <div className="card" style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'400px'}}>
          <div className="empty-state"><div className="empty-state-icon">📚</div>{courses.length===0?'Add a course first using the + Add button':'Select a course to view usage data'}</div>
        </div>
      ) : (
        <div style={{display:'grid',gap:'16px'}}>
          {/* Header */}
          <div className="card">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div className="serif" style={{fontSize:'18px',fontWeight:600}}>{col.name}</div>
                <div style={{fontSize:'13px',color:'var(--ink)',marginTop:'2px',fontWeight:500}}>{activeCourse.name}</div>
                <div style={{fontSize:'12px',color:'var(--muted)',marginTop:'2px'}}>Enrolled: {activeCourse.enrolled} students · {entries.length} updates recorded</div>
              </div>
              <div style={{display:'flex',gap:'8px'}}>
                {entries.length > 0 && (
                  <button onClick={downloadCSV} style={{padding:'8px 14px',borderRadius:'8px',border:'1px solid var(--accent)',background:'white',color:'var(--accent)',fontSize:'12px',fontWeight:600,cursor:'pointer'}}>
                    📥 Download CSV
                  </button>
                )}
                <button onClick={() => setShowAddEntry(true)} style={{padding:'8px 14px',borderRadius:'8px',border:'none',background:'var(--accent)',color:'white',fontSize:'12px',fontWeight:600,cursor:'pointer'}}>
                  + Add Update
                </button>
              </div>
            </div>

            {/* Latest stats summary */}
            {entries.length > 0 && (() => {
              const latest = entries[entries.length - 1];
              const pct = ((latest.users_using / activeCourse.enrolled) * 100).toFixed(1);
              const avg = latest.users_using > 0 ? Math.round((latest.total_hours * 60) / latest.users_using) : 0;
              const prev = entries.length > 1 ? entries[entries.length - 2] : null;
              const prevPct = prev ? ((prev.users_using / activeCourse.enrolled) * 100).toFixed(1) : null;
              const prevAvg = prev && prev.users_using > 0 ? Math.round((prev.total_hours * 60) / prev.users_using) : null;
              const pctChange = prevPct ? (pct - prevPct).toFixed(1) : null;
              const avgChange = prevAvg !== null ? (avg - prevAvg) : null;
              return (
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'12px',marginTop:'16px'}}>
                  <div style={{padding:'12px',background:'var(--surface)',borderRadius:'8px',textAlign:'center'}}>

                    <div style={{fontSize:'11px',color:'var(--muted)'}}>of {activeCourse.enrolled}</div>
                  </div>
                  <div style={{padding:'12px',background:'var(--surface)',borderRadius:'8px',textAlign:'center'}}>
                    <div style={{fontSize:'10px',fontWeight:600,color:'var(--muted)',textTransform:'uppercase'}}>% Users</div>
                    <div style={{fontSize:'20px',fontWeight:700,color:pct>=85?'#2D7A4F':pct>=50?'#B8410A':'#DC2626',marginTop:'4px'}}>{pct}%</div>
                    {pctChange!==null&&<div style={{fontSize:'11px',color:pctChange>=0?'#2D7A4F':'#DC2626'}}>{pctChange>=0?'↑':'↓'} {Math.abs(pctChange)}%</div>}
                  </div>
                  <div style={{padding:'12px',background:'var(--surface)',borderRadius:'8px',textAlign:'center'}}>
                    <div style={{fontSize:'10px',fontWeight:600,color:'var(--muted)',textTransform:'uppercase'}}>Total Hours</div>
                    <div style={{fontSize:'20px',fontWeight:700,color:'var(--ink)',marginTop:'4px'}}>{latest.total_hours.toFixed(0)}</div>
                    <div style={{fontSize:'11px',color:'var(--muted)'}}>hrs</div>
                  </div>
                  <div style={{padding:'12px',background:'var(--surface)',borderRadius:'8px',textAlign:'center'}}>
                    <div style={{fontSize:'10px',fontWeight:600,color:'var(--muted)',textTransform:'uppercase'}}>Avg / User</div>
                    <div style={{fontSize:'20px',fontWeight:700,color:avg>=150?'#2D7A4F':avg>=60?'#B8410A':'#DC2626',marginTop:'4px'}}>{avg}</div>
                    <div style={{fontSize:'11px',color:'var(--muted)'}}>mins{avgChange!==null&&<span style={{color:avgChange>=0?'#2D7A4F':'#DC2626'}}> {avgChange>=0?'↑':'↓'}{Math.abs(avgChange)}</span>}</div>
                  </div>
                </div>
              );
            })()}
          </div>

          {/* Add Entry Form */}
          {showAddEntry && (
            <div className="card" style={{border:'2px solid var(--accent)'}}>
              <div style={{fontSize:'14px',fontWeight:600,color:'var(--ink)',marginBottom:'12px'}}>Add Usage Update</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:'10px'}}>
                <div><label style={lbl}>Date</label><input type="date" style={inp} value={newEntry.date} onChange={e=>setNewEntry({...newEntry,date:e.target.value})} /></div>
                <div><label style={lbl}>No. of Users Using</label><input type="number" style={inp} placeholder="e.g. 784" value={newEntry.users_using} onChange={e=>setNewEntry({...newEntry,users_using:e.target.value})} /></div>
                <div><label style={lbl}>Total Hours</label><input type="number" step="0.01" style={inp} placeholder="e.g. 447.5" value={newEntry.total_hours} onChange={e=>setNewEntry({...newEntry,total_hours:e.target.value})} /></div>
                <div><label style={lbl}>Event Tag <span style={{fontWeight:400}}>(optional)</span></label><input style={inp} placeholder="e.g. WABA C1, INT QUIZ" value={newEntry.event} onChange={e=>setNewEntry({...newEntry,event:e.target.value})} /></div>
              </div>
              <div style={{display:'flex',gap:'8px',marginTop:'12px',justifyContent:'flex-end'}}>
                <button onClick={()=>{setShowAddEntry(false);setNewEntry({date:'',users_using:'',total_hours:'',event:''});}} style={{padding:'7px 14px',borderRadius:'7px',border:'1px solid var(--border)',background:'white',fontSize:'12px',cursor:'pointer',color:'var(--muted)'}}>Cancel</button>
                <button onClick={addEntry} style={{padding:'7px 14px',borderRadius:'8px',border:'none',background:'var(--accent)',color:'white',fontSize:'12px',fontWeight:600,cursor:'pointer'}}>Save Update</button>
              </div>
            </div>
          )}

          {/* Data Table */}
          <div className="card" style={{overflow:'hidden',padding:0}}>
            {entries.length === 0 ? (
              <div className="empty-state" style={{padding:'40px'}}><div className="empty-state-icon">📊</div>No usage data yet. Click "+ Add Update" to start tracking.</div>
            ) : (
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px'}}>
                  <thead>
                    <tr style={{background:'var(--surface)'}}>
                      <th style={{padding:'10px 14px',textAlign:'left',fontWeight:600,color:'var(--muted)',borderBottom:'1px solid var(--border)',position:'sticky',left:0,background:'var(--surface)',zIndex:1}}>Metric</th>
                      {entries.map(e => (
                        <th key={e.id} style={{padding:'10px 12px',textAlign:'center',fontWeight:600,color:'var(--ink)',borderBottom:'1px solid var(--border)',minWidth:'80px',whiteSpace:'nowrap'}}>
                          {new Date(e.date).toLocaleDateString('en-IN',{day:'2-digit',month:'short'})}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td style={{padding:'8px 14px',fontWeight:600,color:'var(--ink)',borderBottom:'1px solid var(--border)',position:'sticky',left:0,background:'white',zIndex:1}}>Total Enrolled</td>
                      {entries.map(e => <td key={e.id} style={{padding:'8px 12px',textAlign:'center',borderBottom:'1px solid var(--border)',color:'var(--ink)'}}>{activeCourse.enrolled}</td>)}
                    </tr>
                    <tr>
                      <td style={{padding:'8px 14px',fontWeight:600,color:'var(--ink)',borderBottom:'1px solid var(--border)',position:'sticky',left:0,background:'white',zIndex:1}}>Users Using</td>
                      {entries.map(e => <td key={e.id} style={{padding:'8px 12px',textAlign:'center',borderBottom:'1px solid var(--border)',color:'var(--ink)',fontWeight:500}}>{e.users_using}</td>)}
                    </tr>
                    <tr>
                      <td style={{padding:'8px 14px',fontWeight:600,color:'var(--ink)',borderBottom:'1px solid var(--border)',position:'sticky',left:0,background:'white',zIndex:1}}>Total Hours</td>
                      {entries.map(e => <td key={e.id} style={{padding:'8px 12px',textAlign:'center',borderBottom:'1px solid var(--border)',color:'var(--ink)'}}>{e.total_hours.toFixed(1)}</td>)}
                    </tr>
                    <tr style={{background:'#FFFDE7'}}>
                      <td style={{padding:'8px 14px',fontWeight:700,color:'var(--ink)',borderBottom:'1px solid var(--border)',position:'sticky',left:0,background:'#FFFDE7',zIndex:1}}>% Users</td>
                      {entries.map(e => {
                        const pct = ((e.users_using/activeCourse.enrolled)*100).toFixed(1);
                        return <td key={e.id} style={{padding:'8px 12px',textAlign:'center',borderBottom:'1px solid var(--border)',fontWeight:700,color:pct>=85?'#2D7A4F':pct>=50?'#B8410A':'#DC2626'}}>{pct}%</td>;
                      })}
                    </tr>
                    <tr style={{background:'#FFFDE7'}}>
                      <td style={{padding:'8px 14px',fontWeight:700,color:'var(--ink)',borderBottom:'1px solid var(--border)',position:'sticky',left:0,background:'#FFFDE7',zIndex:1}}>Avg Usage (mins)</td>
                      {entries.map(e => {
                        const avg = e.users_using > 0 ? Math.round((e.total_hours*60)/e.users_using) : 0;
                        return <td key={e.id} style={{padding:'8px 12px',textAlign:'center',borderBottom:'1px solid var(--border)',fontWeight:700,color:avg>=150?'#2D7A4F':avg>=60?'#B8410A':'#DC2626'}}>{avg}</td>;
                      })}
                    </tr>
                    <tr>
                      <td style={{padding:'8px 14px',fontWeight:500,color:'var(--muted)',borderBottom:'1px solid var(--border)',position:'sticky',left:0,background:'white',zIndex:1,fontStyle:'italic'}}>Event</td>
                      {entries.map(e => <td key={e.id} style={{padding:'8px 12px',textAlign:'center',borderBottom:'1px solid var(--border)',color:'var(--accent)',fontSize:'10px',fontWeight:600}}>{e.event||'—'}</td>)}
                    </tr>
                    <tr>
                      <td style={{padding:'8px 14px',position:'sticky',left:0,background:'white',zIndex:1}}></td>
                      {entries.map(e => <td key={e.id} style={{padding:'6px 12px',textAlign:'center'}}>
                        <button onClick={()=>deleteEntry(e.id)} style={{fontSize:'10px',color:'#DC2626',background:'none',border:'none',cursor:'pointer'}}>Remove</button>
                      </td>)}
                    </tr>
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function newJStep(){return {id:'step_'+Date.now()+'_'+Math.random().toString(36).slice(2),channel:'whatsapp',delay:0,condition:'always',message:'',enabled:true};}
function JourneyBuilder({data,updateCollege}){
  const [selId,setSelId]=React.useState('');
  const [jName,setJName]=React.useState('');
  const [startDate,setStartDate]=React.useState('');
  const [steps,setSteps]=React.useState([]);
  const [saved,setSaved]=React.useState(false);
  const [csvPreview,setCsvPreview]=React.useState(null);
  const [dataSrc,setDataSrc]=React.useState('crm');
  const [showTpl,setShowTpl]=React.useState(false);
  const col=data.colleges.find(c=>c.id===selId);
  const existJ=col&&col.automation_journey;
  React.useEffect(()=>{
    if(col&&existJ){setJName(existJ.name||'');setSteps(existJ.steps||[]);setStartDate(existJ.start_date||'');}
    else{setJName('');setSteps([]);setStartDate('');}
    setSaved(false);setCsvPreview(null);
  },[selId]);
  const addBlank=()=>setSteps(s=>[...s,newJStep()]);
  const loadTpl=(k)=>{
    const t=WF_TEMPLATES[k];if(!t)return;
    setSteps(s=>[...s,...t.map((x,i)=>({...newJStep(),...x,id:'tpl_'+k+'_'+i+'_'+Date.now()}))]);
    setShowTpl(false);
  };
  const updStep=(id,f,v)=>setSteps(s=>s.map(st=>st.id===id?{...st,[f]:v}:st));
  const remStep=(id)=>setSteps(s=>s.filter(st=>st.id!==id));
  const movStep=(idx,dir)=>{const a=[...steps];const sw=idx+dir;if(sw<0||sw>=a.length)return;[a[idx],a[sw]]=[a[sw],a[idx]];setSteps(a);};
  const handleCSV=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=(ev)=>{
      const lines=ev.target.result.split('\n').filter(Boolean);
      const hdrs=lines[0].split(',').map(h=>h.trim());
      const rows=lines.slice(1,6).map(l=>{const v=l.split(',');return Object.fromEntries(hdrs.map((h,i)=>[h,(v[i]||'').trim()]));});
      setCsvPreview({total:lines.length-1,headers:hdrs,rows});setDataSrc('csv');
    };r.readAsText(file);
  };
  const saveJ=()=>{
    if(!selId||!jName||steps.length===0)return;

    setSaved(true);setTimeout(()=>setSaved(false),3000);

    const src=data.colleges.find(c=>c.id===srcId);
    if(!src||!src.automation_journey)return;
    const j=src.automation_journey;
    setJName('Copy of '+j.name);
    setStartDate('');
    setSteps((j.steps||[]).map(s=>({...s,id:'copy_'+Date.now()+'_'+Math.random().toString(36).slice(2)})));

  const CHMAP=Object.fromEntries(CHANNEL_OPTIONS.map(c=>[c.id,c]));
  const inp={width:'100%',padding:'7px 10px',borderRadius:'7px',border:'1px solid var(--border)',fontSize:'12px',background:'white',color:'var(--ink)',outline:'none',boxSizing:'border-box'};

      <div style={{display:'grid',gap:'14px'}}>

          <div style={{display:'grid',gap:'8px',maxHeight:'340px',overflowY:'auto'}}>
            {data.colleges.map(c=>{
              const hasJ=!!c.automation_journey;

                  <div style={{fontSize:'12px',fontWeight:600,color:'var(--ink)'}}>{c.name}</div>
                  <div style={{fontSize:'10px',color:'var(--muted)',marginTop:'2px'}}>{c.location} · {c.total_students||'?'} students</div>
                  {hasJ&&<div style={{fontSize:'10px',color:'#2D7A4F',marginTop:'3px',fontWeight:600}}>✅ Journey saved · {c.automation_journey.start_date?'Starts '+c.automation_journey.start_date:'No start date'}</div>}
                </button>
                {hasJ&&selId!==c.id&&(
                  <div style={{borderTop:'1px solid var(--border)',padding:'6px 12px'}}>
                    <button onClick={()=>{setSelId(selId||c.id);copyFromCollege(c.id);}} style={{fontSize:'10px',color:'var(--accent)',fontWeight:600,background:'none',border:'none',cursor:'pointer',padding:0}}>📋 Copy this journey →</button>

            <input style={inp} placeholder="e.g. Onboarding Journey — June 2026" value={jName} onChange={e=>setJName(e.target.value)} />
            <div style={{marginTop:'12px'}}>

            <div style={{display:'flex',gap:'10px',marginBottom:'14px'}}>

              <div style={{marginBottom:'16px',padding:'14px',background:'var(--surface)',borderRadius:'10px',border:'1px solid var(--border)'}}>
                <div style={{fontSize:'12px',fontWeight:600,color:'var(--ink)',marginBottom:'10px'}}>Choose a template — steps will be appended to your current journey:</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px'}}>
                  {[['onboarding','📦 Onboarding',6],['first_usage','🚀 First Usage',5],['reactivation','⚡ Reactivation',5],['exam_prep','📝 Exam Prep',7],['quiz','🎯 Quiz Journey',5]].map(([k,l,n])=>(
                    <button key={k} onClick={()=>loadTpl(k)} style={{padding:'10px',borderRadius:'8px',border:'1px solid var(--border)',background:'white',cursor:'pointer',fontSize:'12px',fontWeight:500,color:'var(--ink)'}}>
                      {l}<div style={{fontSize:'10px',color:'var(--muted)',marginTop:'2px'}}>{n} steps</div>

                  ))}

                    <div key={step.id} style={{border:'1px solid var(--border)',borderRadius:'10px',overflow:'hidden',opacity:step.enabled?1:0.55}}>

                        <div style={{display:'flex',gap:'4px'}}>
                          <button onClick={()=>movStep(idx,-1)} style={{padding:'3px 7px',border:'1px solid var(--border)',borderRadius:'5px',background:'white',cursor:'pointer',fontSize:'11px',color:'var(--muted)'}}>↑</button>
                          <button onClick={()=>movStep(idx,1)}  style={{padding:'3px 7px',border:'1px solid var(--border)',borderRadius:'5px',background:'white',cursor:'pointer',fontSize:'11px',color:'var(--muted)'}}>↓</button>
                          <button onClick={()=>updStep(step.id,'enabled',!step.enabled)} style={{padding:'3px 8px',border:'1px solid var(--border)',borderRadius:'5px',background:'white',cursor:'pointer',fontSize:'11px',color:step.enabled?'#2D7A4F':'var(--muted)',fontWeight:600}}>{step.enabled?'ON':'OFF'}</button>
                          <button onClick={()=>remStep(step.id)} style={{padding:'3px 8px',border:'1px solid #FECACA',borderRadius:'5px',background:'#FEF2F2',cursor:'pointer',fontSize:'11px',color:'#DC2626'}}>✕</button>
                        </div>
                      </div>
                      <div style={{padding:'12px 14px',display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'10px'}}>
                        <div><label style={lbl}>Channel</label>
                          <select style={inp} value={step.channel} onChange={e=>updStep(step.id,'channel',e.target.value)}>
                            {CHANNEL_OPTIONS.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
                          </select>
                        </div>
                        <div><label style={lbl}>Delay (days after previous)</label>
                          <input type="number" min="0" style={inp} value={step.delay} onChange={e=>updStep(step.id,'delay',parseInt(e.target.value)||0)} />
                        </div>
                        <div><label style={lbl}>Condition</label>
                          <select style={inp} value={step.condition} onChange={e=>updStep(step.id,'condition',e.target.value)}>
                            {CONDITION_OPTIONS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
                          </select>
                        </div>
                      </div>
                      <div style={{padding:'0 14px 12px'}}>
                        <label style={lbl}>Message / Notes</label>
                        <textarea style={{...inp,minHeight:'64px',resize:'vertical',lineHeight:1.5}} value={step.message} onChange={e=>updStep(step.id,'message',e.target.value)} placeholder="Type your message. Use [name], [link], [reg_no] as placeholders." />
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
          <div style={{display:'flex',justifyContent:'flex-end',gap:'12px',alignItems:'center'}}>
            {saved&&<div style={{padding:'10px 16px',borderRadius:'9px',background:'#E8F3EC',color:'#2D7A4F',fontSize:'13px',fontWeight:600}}>✅ Journey saved!</div>}
            <button onClick={saveJ} disabled={!jName||steps.length===0} style={{padding:'11px 28px',borderRadius:'9px',border:'none',background:(!jName||steps.length===0)?'var(--border)':'var(--accent)',color:'white',fontSize:'14px',fontWeight:600,cursor:(!jName||steps.length===0)?'not-allowed':'pointer'}}>
              💾 Save Journey
            </button>
          </div>
        </div>
      )}
    </div>
  );
}
function Stat({ label, value, icon, onClick, active }) {
  const interactive = !!onClick;
  return (
    <div
      className="stat-card"
      onClick={onClick}
      role={interactive ? 'button' : undefined}
      tabIndex={interactive ? 0 : undefined}
      onKeyDown={interactive ? (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onClick(); } } : undefined}
      style={interactive ? {cursor:'pointer',borderColor:active?'var(--accent)':'var(--border)',boxShadow:active?'0 0 0 2px rgba(184,65,10,0.12)':'var(--shadow-xs)'} : undefined}
    >
      <div className="label"><span>{label}</span><span>{icon}</span></div>
      <div className="value">{value}</div>
    </div>
  );
}

function TaskCard({ college, action, onClick }) {
